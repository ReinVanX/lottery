<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 医焕安全球药物警戒年会 · 抽奖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* === CSS Reset & Variables (海报深金会务风格) === */
    :root {
      --bg-deep: #050B18;
      --bg-mid: #0A1628;
      --gold: #E8A838;
      --gold-bright: #F5C842;
      --gold-deep: #C88A20;
      --text: #FFFFFF;
      --text-dim: rgba(255, 255, 255, 0.72);
      --text-muted: rgba(255, 255, 255, 0.45);
      --card-bg: rgba(5, 11, 24, 0.72);
      --glass-bg: rgba(5, 11, 24, 0.35);
      --glass-border: rgba(232, 168, 56, 0.22);
      --glass-blur: 36px;
      --glass-saturate: 1.5;
      --glass-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.07),
        inset 0 0 48px rgba(255, 180, 60, 0.04),
        0 8px 40px rgba(0, 0, 0, 0.35);
      --border: rgba(232, 168, 56, 0.28);
      --glow: 0 0 24px rgba(255, 180, 60, 0.45);
      --gold-glow: 0 0 30px rgba(255, 180, 60, 0.5);
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --font-sans: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'PingFang SC', 'Source Han Sans SC', 'Microsoft YaHei', sans-serif;
      --font-serif: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background:
        radial-gradient(ellipse 55% 45% at 12% 18%, rgba(255,160,50,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 88% 75%, rgba(255,140,40,0.05) 0%, transparent 60%),
        linear-gradient(180deg, #0A1628 0%, var(--bg-deep) 55%, #030810 100%);
      color: var(--text);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* === 背景装饰层 === */
    #bgDecor {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #bgDecor::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 45% 35% at 15% 20%, rgba(255, 160, 50, 0.1) 0%, transparent 70%),
        radial-gradient(ellipse 35% 25% at 85% 80%, rgba(255, 140, 40, 0.06) 0%, transparent 65%);
    }

    /* 右下角程序化天际线 */
    #bgSkylineCanvas {
      position: absolute;
      right: 0;
      bottom: 0;
      width: min(52vw, 680px);
      height: min(36vh, 280px);
      opacity: 0.88;
      mask-image:
        linear-gradient(to left, black 55%, transparent 100%),
        linear-gradient(to top, black 75%, transparent 100%);
      -webkit-mask-image:
        linear-gradient(to left, black 55%, transparent 100%),
        linear-gradient(to top, black 75%, transparent 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    /* 底部金色光轨 */
    .bg-light-trails {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 45%;
      opacity: 0.5;
    }
    .bg-light-trails svg {
      width: 100%;
      height: 100%;
    }

    .watermark {
      position: absolute;
      font-family: var(--font-display);
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .watermark-brand {
      left: 1vw;
      top: 12vh;
      font-size: clamp(72px, 13vw, 180px);
      letter-spacing: 0.14em;
      color: rgba(232, 168, 56, 0.038);
    }
    .watermark-year {
      right: 5vw;
      bottom: 4vh;
      font-size: clamp(100px, 20vw, 260px);
      letter-spacing: -0.02em;
      color: rgba(232, 168, 56, 0.035);
    }

    @keyframes trailFlow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -400; }
    }

    /* 右侧活动信息栏 */
    #eventSidebar {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      pointer-events: none;
      text-align: right;
      padding-right: 20px;
      border-right: 2px solid rgba(232, 168, 56, 0.45);
    }
    #eventSidebar .event-date {
      font-size: clamp(22px, 2.8vw, 36px);
      font-weight: 800;
      color: var(--gold-bright);
      text-shadow: 0 0 16px rgba(255, 180, 60, 0.35);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    #eventSidebar .event-city {
      font-size: clamp(14px, 1.6vw, 20px);
      color: var(--text-dim);
      margin-bottom: 28px;
      letter-spacing: 0.06em;
    }
    #eventSidebar .event-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,168,56,0.6));
      margin: 20px 0 20px auto;
    }

    /* === Canvas Layer === */
    #animCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* === View Containers === */
    .view {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .view.active { display: flex; }

    /* === 毛玻璃面板（配置 / 导入 / 结果 / 抽奖） === */
    .panel,
    .bracket-frame {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .panel {
      border-radius: 4px;
      padding: 40px 48px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border: 1px solid var(--gold);
      border-radius: 4px;
      background: rgba(232, 168, 56, 0.08);
      color: var(--gold-bright);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: var(--font-sans);
      position: relative;
    }
    .btn:hover {
      background: rgba(232, 168, 56, 0.18);
      box-shadow: var(--glow);
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
      border-color: var(--gold-bright);
      color: #1a1000;
      box-shadow: var(--glow);
      font-size: 20px;
      padding: 16px 48px;
      letter-spacing: 0.05em;
      font-weight: 700;
    }
    .btn.primary:hover {
      box-shadow: 0 0 32px rgba(255, 180, 60, 0.55);
    }
    .btn.danger {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }
    .btn.gold {
      border-color: var(--gold-bright);
      color: var(--gold-bright);
      background: rgba(232, 168, 56, 0.12);
      box-shadow: var(--gold-glow);
    }

    .title {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .title-accent {
      color: var(--gold-bright);
      text-shadow: 0 0 20px rgba(255, 180, 60, 0.4);
    }
    .brand-slogan {
      font-size: 17px;
      color: var(--gold);
      letter-spacing: 0.14em;
      margin-bottom: 24px;
      text-align: center;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-dim);
      margin-bottom: 32px;
      text-align: center;
    }

    /* === Mute Button === */
    #btnMute {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #btnMute:hover { color: var(--gold-bright); border-color: var(--gold); }

    /* === Config Table === */
    #configTable {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
    }
    #configTable th, #configTable td {
      padding: 12px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    #configTable th {
      color: var(--gold-bright);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #configTable input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 16px;
      text-align: center;
      width: 160px;
      font-family: var(--font-sans);
      transition: border-color 0.2s;
    }
    #configTable input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(232, 168, 56, 0.25);
    }
    #configTable input[name="prizeCount"] { width: 80px; }
    .btn-del {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .btn-del:hover { color: #ef4444; border-color: #ef4444; }

    /* === Drop Zone === */
    #dropZone {
      border: 2px dashed var(--glass-border);
      border-radius: 4px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(232, 168, 56, 0.03);
      backdrop-filter: blur(12px) saturate(1.3);
      -webkit-backdrop-filter: blur(12px) saturate(1.3);
    }
    #dropZone:hover, #dropZone.dragover {
      border-color: var(--gold);
      background: rgba(232, 168, 56, 0.05);
      box-shadow: inset 0 0 40px rgba(255, 180, 60, 0.06);
    }

    /* === Preview List === */
    #previewList {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .name-tag {
      padding: 6px 14px;
      background: rgba(232, 168, 56, 0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text);
    }

    /* === 全局品牌信息（所有页面左上角） === */
    #brandHeader {
      position: fixed;
      top: 24px;
      left: 40px;
      z-index: 10;
      text-align: left;
      pointer-events: none;
    }
    .brand-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .brand-event {
      font-family: var(--font-display);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .brand-event-sub {
      font-size: clamp(14px, 1.6vw, 20px);
      opacity: 0.85;
      margin-top: 2px;
    }
    .brand-slogan-inline {
      font-size: 15px;
      color: var(--gold-bright);
      letter-spacing: 0.1em;
      margin-top: 6px;
      text-shadow: 0 0 12px rgba(255, 180, 60, 0.25);
    }

    #lotteryInfo {
      position: fixed;
      top: 28px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #lotteryPrizeName {
      font-family: var(--font-serif);
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 900;
      color: var(--gold-bright);
      text-shadow: 0 0 24px rgba(255, 180, 60, 0.45);
      letter-spacing: 0.06em;
    }
    #lotteryProgress {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 8px;
      letter-spacing: 0.1em;
    }
    #lotteryStandby {
      text-align: center;
      z-index: 10;
    }
    .bracket-frame {
      position: relative;
      padding: 48px 72px 40px;
      max-width: 720px;
    }
    .bracket-frame::before,
    .bracket-frame::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold-bright);
      border-style: solid;
      pointer-events: none;
    }
    .bracket-frame::before {
      top: -1px; left: -1px;
      border-width: 3px 0 0 3px;
      box-shadow: -2px -2px 12px rgba(255, 180, 60, 0.3);
    }
    .bracket-frame::after {
      top: -1px; right: -1px;
      border-width: 3px 3px 0 0;
      box-shadow: 2px -2px 12px rgba(255, 180, 60, 0.3);
    }
    .bracket-corner-bl,
    .bracket-corner-br {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold-bright);
      border-style: solid;
      pointer-events: none;
    }
    .bracket-corner-bl {
      bottom: -1px; left: -1px;
      border-width: 0 0 3px 3px;
      box-shadow: -2px 2px 12px rgba(255, 180, 60, 0.3);
    }
    .bracket-corner-br {
      bottom: -1px; right: -1px;
      border-width: 0 3px 3px 0;
      box-shadow: 2px 2px 12px rgba(255, 180, 60, 0.3);
    }
    .bracket-label {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #lotteryStandby p { margin-bottom: 12px; }
    #standbyNext {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }
    #standbyRemaining {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    #standbyDrawn {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 80vw;
    }
    .drawn-tag {
      padding: 8px 18px;
      background: rgba(232, 168, 56, 0.12);
      border: 1px solid rgba(232, 168, 56, 0.4);
      border-radius: 4px;
      font-size: 16px;
      color: var(--gold-bright);
      box-shadow: 0 0 12px rgba(255, 180, 60, 0.15);
    }
    #lotteryActions {
      position: fixed;
      bottom: 50px;
      left: 0;
      width: 100%;
      display: flex;
      gap: 24px;
      justify-content: center;
      z-index: 10;
    }
    #lotteryActions .btn {
      min-width: 200px;
      justify-content: center;
    }

    /* === Results View === */
    .prize-group {
      margin-bottom: 24px;
    }
    .prize-group h2 {
      color: var(--gold-bright);
      font-size: 24px;
      margin-bottom: 12px;
      text-align: center;
    }
    .winner-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .winner-card {
      padding: 12px 24px;
      background: rgba(232, 168, 56, 0.12);
      border: 1px solid rgba(232, 168, 56, 0.4);
      border-radius: 4px;
      font-size: 18px;
      color: var(--gold-bright);
      font-weight: 600;
      box-shadow: 0 0 16px rgba(255, 180, 60, 0.18);
    }

    /* Prize Summary Cards */
    .summary-winner-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 28px;
      background: rgba(232, 168, 56, 0.1);
      border: 1px solid rgba(232, 168, 56, 0.3);
      border-radius: 14px;
      animation: summaryFadeIn 0.5s ease both;
    }
    .summary-num {
      font-size: 18px; color: rgba(232, 168, 56, 0.55); font-weight: 700;
      min-width: 32px;
    }
    .summary-name {
      font-size: 24px; color: var(--gold-bright); font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 180, 60, 0.4);
    }
    @keyframes summaryFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Print Styles === */
    @media (max-width: 1100px) {
      #eventSidebar { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn, .bracket-frame, .panel, .watermark,
      .bg-light-trails path, #bgSkylineCanvas { transition: none; animation: none; }
    }

    @media print {
      /* Reset page */
      @page { margin: 20mm 15mm; size: A4; }
      body { background: #fff; color: #000; font-size: 14px; }

      /* Hide everything except results */
      #animCanvas, #bgDecor, #btnMute, #eventSidebar, #brandHeader, #bgSkylineCanvas,
      #view-config, #view-import, #view-lottery,
      #lotteryStopArea, #lotteryActions, #prizeSummary,
      .btn, button, .bg-light-trails { display: none !important; }

      /* Only results view is visible */
      #view-results { position: static !important; display: block !important;
        width: 100% !important; height: auto !important; }

      /* Remove panel constraints */
      .panel { max-height: none !important; max-width: 100% !important;
        overflow: visible !important; border: none !important;
        box-shadow: none !important; background: #fff !important;
        padding: 0 !important; backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important; }

      /* Typography */
      .title { font-size: 24px; color: #000; margin-bottom: 16px;
        -webkit-text-fill-color: #000; background: none; text-align: center; }
      .prize-group { margin-bottom: 18px; page-break-inside: avoid; }
      .prize-group h2 { font-size: 18px; color: #333; margin-bottom: 10px;
        border-bottom: 2px solid #333; padding-bottom: 6px; text-align: left; }
      .winner-cards { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
      .winner-card { padding: 6px 16px; border: 1px solid #999; border-radius: 3px;
        font-size: 14px; color: #000; font-weight: 500; box-shadow: none;
        background: #f9f9f9; }
      #resultsTotal { font-size: 16px; color: #333; font-weight: 700;
        text-align: center; margin: 16px 0; }

      /* Hide the summary winner cards in print (they're used during live flow) */
      .summary-winner-card { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="bgDecor" aria-hidden="true">
    <canvas id="bgSkylineCanvas"></canvas>
    <div class="bg-light-trails">
      <svg viewBox="0 0 1920 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#E8A838" stop-opacity="0"/>
            <stop offset="40%" stop-color="#F5C842" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M0,320 C300,280 500,200 800,240 S1400,360 1920,300" fill="none" stroke="url(#trailGrad)" stroke-width="2" stroke-dasharray="12 18" style="animation:trailFlow 20s linear infinite"/>
        <path d="M0,360 C400,300 700,380 1100,320 S1600,260 1920,340" fill="none" stroke="rgba(232,168,56,0.25)" stroke-width="1.5" stroke-dasharray="8 14" style="animation:trailFlow 28s linear infinite reverse"/>
        <path d="M0,280 C200,350 600,180 1000,220 S1500,300 1920,260" fill="none" stroke="rgba(255,180,60,0.18)" stroke-width="1" stroke-dasharray="6 10" style="animation:trailFlow 35s linear infinite"/>
      </svg>
    </div>
    <div class="watermark watermark-brand" aria-hidden="true">NEXTROVE</div>
    <div class="watermark watermark-year" aria-hidden="true">2026</div>
  </div>
  <div id="eventSidebar" aria-hidden="true">
    <div class="event-date">2026.09.08</div>
    <div class="event-city">中国 · 上海</div>
    <div class="event-divider"></div>
    <div class="event-date">2026.09.10</div>
    <div class="event-city">中国 · 北京</div>
  </div>
  <div id="brandHeader" aria-hidden="true">
    <div class="brand-logo">NEXTROVE</div>
    <div class="brand-event">2026 医焕安全球药物警戒年会</div>
    <div class="brand-event brand-event-sub">中国站</div>
    <div class="brand-slogan-inline">「智联全球 警戒未来」</div>
  </div>
  <canvas id="animCanvas"></canvas>
  <button id="btnMute" title="静音/取消静音">🔊</button>

  <!-- View 1: Config -->
  <div id="view-config" class="view active">
    <div class="panel">
      <h1 class="title">年会抽奖</h1>
      <p class="subtitle">第一步：设置奖项</p>
      <table id="configTable">
        <thead><tr><th>奖项名称</th><th>中奖人数</th><th>操作</th></tr></thead>
        <tbody id="configBody"></tbody>
      </table>
      <div style="text-align:center;margin:16px 0;">
        <button id="btnAddPrize" class="btn">+ 添加奖项</button>
      </div>
      <p id="configSummary" style="text-align:center;color:var(--text-dim);margin-bottom:20px;"></p>
      <div style="text-align:center;">
        <button id="btnConfigNext" class="btn primary">保存并进入下一步 →</button>
      </div>
    </div>
  </div>

  <!-- View 2: Import -->
  <div id="view-import" class="view">
    <div class="panel">
      <h1 class="title">导入名单</h1>

        <p style="font-size:20px;color:var(--gold-bright);">拖拽文件到此处</p>
        <p style="color:var(--text-dim);margin-top:8px;">或点击选择 CSV / Excel 文件</p>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" hidden>

      <div id="importError" style="color:#ef4444;text-align:center;margin:12px 0;display:none;"></div>

      </div>
      <div style="text-align:center;margin-top:20px;">
        <button id="btnImportBack" class="btn">← 返回</button>
        <button id="btnImportNext" class="btn primary" style="display:none;">确认名单，共 <span id="importCount">0</span> 人 →</button>
      </div>
    </div>
  </div>

  <!-- View 3: Lottery -->
  <div id="view-lottery" class="view">
    <div id="lotteryInfo">
      <p id="lotteryPrizeName"></p>
      <p id="lotteryProgress"></p>
    </div>
    <div id="lotteryStandby">
      <div class="bracket-frame">
        <span class="bracket-corner-bl" aria-hidden="true"></span>
        <span class="bracket-corner-br" aria-hidden="true"></span>
        <p class="bracket-label">现场抽奖</p>
        <p id="standbyNext"></p>
        <p id="standbyRemaining"></p>
        <button id="btnStartDraw" class="btn primary">开始抽取下一位</button>
        <div id="standbyDrawn" style="margin-top:24px;"></div>
      </div>
    </div>
    <div id="lotteryStopArea" style="display:none;position:fixed;bottom:50px;left:0;width:100%;z-index:20;justify-content:center;">
      <button id="btnStopDraw" class="btn" style="background:rgba(239,68,68,0.15);border-color:#ef4444;color:#ef4444;font-size:24px;padding:18px 56px;">🛑 停 止</button>
    </div>

      <button id="btnConfirm" class="btn gold">确认中奖</button>
      <button id="btnVoid" class="btn danger">作废重抽</button>

    <!-- Prize Summary Overlay -->
    <div id="prizeSummary" style="display:none;position:fixed;inset:0;z-index:30;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,11,24,0.92);">
      <div class="panel" style="text-align:center;min-width:500px;">
        <h2 id="summaryPrizeName" style="color:var(--gold-bright);font-size:30px;margin-bottom:24px;text-shadow:0 0 20px rgba(255,180,60,0.5);"></h2>
        <div id="summaryWinnerList" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:28px;"></div>

  <!-- View 4: Results -->
  <div id="view-results" class="view">
    <div class="panel">
      <h1 class="title">中奖结果汇总</h1>
      <div id="resultsList"></div>
      <p id="resultsTotal" style="text-align:center;color:var(--gold-bright);margin:20px 0;"></p>
      <div style="text-align:center;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
        <button id="btnExport" class="btn primary">📥 导出 CSV</button>
        <button id="btnPrint" class="btn">🖨️ 打印</button>
        <button id="btnReset" class="btn danger">🔄 重置全部数据</button>
      </div>
    </div>
  </div>

  <script>
  // ========== StateManager ==========
  const KEYS = {
    config: 'lottery_config',
    candidates: 'lottery_candidates',
    original: 'lottery_original',
    winners: 'lottery_winners',
    state: 'lottery_state'
  };

  const StateManager = {
    state: {
      config: [],        // [{name: string, count: number}]
      candidates: [],    // string[]
      original: [],      // string[]
      winners: [],       // [{name: string, prize: string, time: string}]
      currentPrizeIdx: 0,
      currentSlotIdx: 0
    },

    save() {
      localStorage.setItem(KEYS.config, JSON.stringify(this.state.config));
      localStorage.setItem(KEYS.candidates, JSON.stringify(this.state.candidates));
      localStorage.setItem(KEYS.original, JSON.stringify(this.state.original));
      localStorage.setItem(KEYS.winners, JSON.stringify(this.state.winners));
      localStorage.setItem(KEYS.state, JSON.stringify({
        currentPrizeIdx: this.state.currentPrizeIdx,
        currentSlotIdx: this.state.currentSlotIdx
      }));
    },

    load() {
      try {
        const config = localStorage.getItem(KEYS.config);
        const candidates = localStorage.getItem(KEYS.candidates);
        const original = localStorage.getItem(KEYS.original);
        const winners = localStorage.getItem(KEYS.winners);
        const st = localStorage.getItem(KEYS.state);
        if (config) this.state.config = JSON.parse(config);
        if (candidates) this.state.candidates = JSON.parse(candidates);
        if (original) this.state.original = JSON.parse(original);
        if (winners) this.state.winners = JSON.parse(winners);
        if (st) {
          const parsed = JSON.parse(st);
          this.state.currentPrizeIdx = parsed.currentPrizeIdx || 0;
          this.state.currentSlotIdx = parsed.currentSlotIdx || 0;
        }
        return !!(config || candidates);
      } catch (e) {
        console.error('StateManager.load failed:', e);
        return false;
      }
    },

    reset() {
      Object.values(KEYS).forEach(k => localStorage.removeItem(k));
      this.state = {
        config: [],
        candidates: [],
        original: [],
        winners: [],
        currentPrizeIdx: 0,
        currentSlotIdx: 0
      };
    },

    hasSavedData() {
      return !!localStorage.getItem(KEYS.config);
    }
  };

  // ========== Session Restore ==========
  function checkRestore() {
    if (StateManager.load()) {
      const hasWinners = StateManager.state.winners.length > 0;
      const hasCandidates = StateManager.state.candidates.length > 0;
      if (hasWinners || hasCandidates) {
        const action = confirm(
          '检测到上次的抽奖数据。\n\n' +
          '点击「确定」继续上次进度\n' +
          '点击「取消」重新开始'
        );
        if (!action) {
          StateManager.reset();
        }
      }
    }
  }

  // ========== ConfigView ==========
  const ConfigView = {
    init() {
      document.getElementById('btnAddPrize').addEventListener('click', () => this.addRow());
      document.getElementById('btnConfigNext').addEventListener('click', () => this.saveAndNext());
      this.render();
    },

    render() {
      const tbody = document.getElementById('configBody');
      const config = StateManager.state.config;
      tbody.innerHTML = config.map((prize, i) => `
        <tr>
          <td><input type="text" name="prizeName" value="${this.esc(prize.name)}"
                     data-index="${i}" placeholder="奖项名称"></td>
          <td><input type="number" name="prizeCount" value="${prize.count}"
                     data-index="${i}" min="1" placeholder="人数"></td>
          <td><button class="btn-del" data-index="${i}" title="删除">✕</button></td>
        </tr>
      `).join('');

      // Bind events
      tbody.querySelectorAll('input[name="prizeName"]').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.index);
          StateManager.state.config[idx].name = e.target.value;
          this.updateSummary();
          StateManager.save();
        });
      });
      tbody.querySelectorAll('input[name="prizeCount"]').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.index);
          const val = Math.max(1, parseInt(e.target.value) || 1);
          e.target.value = val;
          StateManager.state.config[idx].count = val;
          this.updateSummary();
          StateManager.save();
        });
      });
      tbody.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          StateManager.state.config.splice(idx, 1);
          StateManager.save();
          this.render();
        });
      });

      this.updateSummary();
    },

    addRow() {
      StateManager.state.config.push({ name: '', count: 1 });
      StateManager.save();
      this.render();
      // Focus the new row's name input
      const inputs = document.querySelectorAll('#configBody input[name="prizeName"]');
      const last = inputs[inputs.length - 1];
      if (last) last.focus();
    },

    saveAndNext() {
      // Validate
      const config = StateManager.state.config;
      if (config.length === 0) {
        alert('请至少添加一个奖项');
        return;
      }
      for (let i = 0; i < config.length; i++) {
        if (!config[i].name.trim()) {
          alert(`第 ${i + 1} 个奖项名称为空，请填写`);
          return;
        }
      }
      StateManager.save();
      ImportView.show();
    },

    updateSummary() {
      const total = StateManager.state.config.reduce((sum, p) => sum + p.count, 0);
      document.getElementById('configSummary').textContent =
        total > 0 ? `总计将抽出 ${total} 人` : '请添加奖项';
    },

    esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    },

    show() { ViewController.switchTo('view-config'); this.render(); },
    hide() { document.getElementById('view-config').classList.remove('active'); }
  };

  // ========== Simple CSV Parser (replaces Papa Parse) ==========
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQuotes) {
        if (ch === '"') {
          if (text[i + 1] === '"') { cell += '"'; i++; }
          else { inQuotes = false; }
        } else { cell += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(cell); cell = ''; }
        else if (ch === '\n' || (ch === '\r' && text[i + 1] !== '\n')) {
          row.push(cell);
          if (row.some(c => c !== '')) rows.push(row);
          row = []; cell = '';
        } else if (ch !== '\r') { cell += ch; }
      }
    }
    row.push(cell);
    if (row.some(c => c !== '')) rows.push(row);
    return rows;
  }

  // ========== ViewController ==========
  const ViewController = {
    switchTo(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }
  };

  // ========== ImportView ==========
  const ImportView = {
    _pendingNames: null,

    init() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault(); dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) this.processFile(file);
      });
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) this.processFile(file);
      });
      document.getElementById('btnImportBack').addEventListener('click', () => ConfigView.show());
      document.getElementById('btnImportNext').addEventListener('click', () => this.confirmImport());
    },

    processFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      document.getElementById('importError').style.display = 'none';
      if (ext !== 'csv') {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '仅支持 CSV 格式（请将 Excel 另存为 CSV UTF-8 编码）';
        return;
      }
      // Try UTF-8 first
      const reader = new FileReader();
      reader.onload = (e) => {
        const text = e.target.result;
        const rows = parseCSV(text);
        const firstCell = (rows[0] && rows[0][0]) || '';
        if (this._looksGarbled(firstCell)) {
          this._readAsGBK(file); return;
        }
        this._handleResult(rows);
      };
      reader.readAsText(file, 'UTF-8');
    },

    _readAsGBK(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const decoder = new TextDecoder('gbk');
        const text = decoder.decode(new Uint8Array(e.target.result));
        this._handleResult(parseCSV(text));
      };
      reader.readAsArrayBuffer(file);
    },

    _looksGarbled(str) {
      const bad = (str.match(/[�\x00-\x08\x0b\x0c\x0e-\x1f]/g) || []).length;
      return bad > str.length * 0.3;
    },

    _handleResult(rows) {
      if (!rows.length) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '未识别到任何姓名';
        return;
      }
      let colIdx = 0;
      let dataRows = rows;
      const header = rows[0];
      const headerStr = (Array.isArray(header) ? header.join(' ') : String(header)).toLowerCase();
      if (headerStr.includes('姓名') || headerStr.includes('名字') || headerStr.includes('name')) {
        for (let i = 0; i < header.length; i++) {
          const h = (header[i] || '').toLowerCase();
          if (h.includes('姓名') || h.includes('名字') || h.includes('name')) { colIdx = i; break; }
        }
        dataRows = rows.slice(1);
      }
      if (dataRows.length && dataRows[0].length) {
        const firstVal = String(dataRows[0][colIdx] || '').trim();
        if (firstVal.length > 10 || firstVal.toLowerCase() === 'name' || firstVal === '姓名') {
          dataRows = dataRows.slice(1);
        }
      }
      const names = dataRows.map(row => String(row[colIdx] || '').trim())
        .filter(name => name.length > 0 && name.length < 50);
      if (!names.length) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '未识别到任何姓名，请检查文件格式';
        return;
      }
      const totalNeeded = StateManager.state.config.reduce((s, p) => s + p.count, 0);
      if (names.length < totalNeeded) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent =
          `名单人数（${names.length}）少于奖项总人数（${totalNeeded}），差额 ${totalNeeded - names.length} 人`;
      }
      const previewArea = document.getElementById('previewArea');
      const previewList = document.getElementById('previewList');
      previewList.innerHTML = names.slice(0, 200)
        .map(n => `<span class="name-tag">${this._esc(n)}</span>`).join('');
      if (names.length > 200) {
        previewList.innerHTML += `<p style="width:100%;text-align:center;color:var(--text-dim);">... 还有 ${names.length - 200} 人</p>`;
      }
      document.getElementById('previewCount').textContent = `共识别 ${names.length} 人`;
      document.getElementById('importCount').textContent = names.length;
      previewArea.style.display = 'block';
      document.getElementById('btnImportNext').style.display = 'inline-flex';
      this._pendingNames = names;
    },

    confirmImport() {
      if (!this._pendingNames || !this._pendingNames.length) return;
      StateManager.state.candidates = [...this._pendingNames];
      StateManager.state.original = [...this._pendingNames];
      StateManager.state.currentPrizeIdx = 0;
      StateManager.state.currentSlotIdx = 0;
      StateManager.state.winners = [];
      StateManager.save();
      this._pendingNames = null;
      LotteryView.show();
    },

    _esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    },

    show() {
      ViewController.switchTo('view-import');
      document.getElementById('previewArea').style.display = 'none';
      document.getElementById('btnImportNext').style.display = 'none';
      document.getElementById('importError').style.display = 'none';
    },

    hide() { document.getElementById('view-import').classList.remove('active'); }
  };

  // ========== ParticleEngine ==========
  const ParticleEngine = {
    canvas: null, ctx: null, particles: [], mode: 'idle', animId: null, PARTICLE_COUNT: 120,

    init() {
      this.canvas = document.getElementById('animCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.resize();
      window.addEventListener('resize', () => this.resize());
      for (let i = 0; i < this.PARTICLE_COUNT; i++) this.particles.push(this._create());
      this._loop();
    },

    resize() {
      const dpr = window.devicePixelRatio || 1;
      this.canvas.width = window.innerWidth * dpr;
      this.canvas.height = window.innerHeight * dpr;
      this.canvas.style.width = window.innerWidth + 'px';
      this.canvas.style.height = window.innerHeight + 'px';
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    },

    setMode(mode) { this.mode = mode; },

    _create() {
      const h = window.innerHeight;
      return {
        x: Math.random() * window.innerWidth,
        y: h * 0.45 + Math.random() * h * 0.55,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.3 - 0.1,
        size: Math.random() * 2.5 + 0.5,
        alpha: Math.random() * 0.45 + 0.15,
        color: Math.random() > 0.5 ? '255, 180, 60' : '232, 168, 56'
      };
    },

    burst(x, y, count) {
      for (let i = 0; i < (count || 60); i++) {
        const angle = (Math.PI * 2 * i) / (count || 60) + (Math.random() - 0.5) * 0.5;
        const speed = Math.random() * 4 + 2;
        this.particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: Math.random() * 3 + 1, alpha: 1, color: '245, 200, 66',
          life: 1, decay: 0.008 + Math.random() * 0.02
        });
      }
    },

    _update() {
      const w = window.innerWidth, h = window.innerHeight, cx = w / 2, cy = h / 2;
      for (let i = this.particles.length - 1; i >= 0; i--) {
        const p = this.particles[i];
        if (p.life !== undefined) {
          p.life -= p.decay; p.x += p.vx; p.y += p.vy; p.vy += 0.02; p.alpha = p.life;
          if (p.life <= 0) { this.particles.splice(i, 1); continue; }
        } else {
          if (this.mode === 'accelerate') {
            const dx = cx - p.x, dy = cy - p.y, dist = Math.sqrt(dx * dx + dy * dy) || 1;
            p.vx += (dx / dist) * 0.03; p.vy += (dy / dist) * 0.03;
            const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (spd > 4) { p.vx = (p.vx / spd) * 4; p.vy = (p.vy / spd) * 4; }
          }
          p.x += p.vx; p.y += p.vy;
          if (p.x < -10) p.x = w + 10; if (p.x > w + 10) p.x = -10;
          if (p.y < -10) p.y = h + 10; if (p.y > h + 10) p.y = -10;
        }
      }
      const ambient = this.particles.filter(p => p.life === undefined).length;
      if (ambient < this.PARTICLE_COUNT) this.particles.push(this._create());
    },

    _draw() {
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      for (const p of this.particles) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`; ctx.fill();
        if (p.life !== undefined && p.life > 0.5) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.color}, ${p.alpha * 0.25})`; ctx.fill();
        }
      }
    },

    _loop() {
      this._update(); this._draw();
      this.animId = requestAnimationFrame(() => this._loop());
    }
  };

  // ========== SkylineEngine（右下角程序化天际线） ==========
  const SkylineEngine = {
    canvas: null, ctx: null, buildings: [], windows: [], animId: null,
    reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,

    init() {
      this.canvas = document.getElementById('bgSkylineCanvas');
      if (!this.canvas) return;
      this.ctx = this.canvas.getContext('2d');
      this._resize();
      window.addEventListener('resize', () => this._resize());
      if (this.reducedMotion) this._draw(0);
      else this._loop(0);
    },

    _resize() {
      const dpr = window.devicePixelRatio || 1;
      const w = this.canvas.clientWidth || 640;
      const h = this.canvas.clientHeight || 280;
      this.canvas.width = w * dpr;
      this.canvas.height = h * dpr;
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      this._generate(w, h);
      if (this.reducedMotion) this._draw(0);
    },

    _generate(w, h) {
      this.buildings = [];
      // 地标塔（东方明珠风格）靠最右
      this.buildings.push({ x: w - 52, width: 28, height: h * 0.88, type: 'pearl' });
      this.buildings.push({ x: w - 88, width: 36, height: h * 0.72, type: 'tower' });
      // 从右向左填充普通楼群
      let x = w - 100;
      while (x > w * 0.08) {
        const bw = 14 + Math.random() * 32;
        const bh = h * (0.22 + Math.random() * 0.55);
        x -= bw + 2 + Math.random() * 10;
        this.buildings.push({ x, width: bw, height: bh, type: 'block' });
      }
      this.buildings.sort((a, b) => a.x - b.x);
      this.windows = [];
      for (const b of this.buildings) {
        if (b.type === 'pearl') continue;
        const baseY = h - b.height;
        for (let wy = 10; wy < b.height - 8; wy += 11 + Math.random() * 7) {
          for (let wx = 5; wx < b.width - 5; wx += 9 + Math.random() * 5) {
            if (Math.random() > 0.38) {
              this.windows.push({
                x: b.x + wx, y: baseY + wy,
                phase: Math.random() * Math.PI * 2,
                speed: 0.06 + Math.random() * 0.18,
                size: b.type === 'tower' ? 4 : 3
              });
            }
          }
        }
      }
    },

    _drawBuilding(ctx, b, h) {
      const y = h - b.height;
      if (b.type === 'pearl') {
        const cx = b.x + b.width / 2;
        const shaftH = b.height * 0.55;
        const grad = ctx.createLinearGradient(b.x, y, b.x + b.width, h);
        grad.addColorStop(0, 'rgba(20, 35, 60, 0.95)');
        grad.addColorStop(1, 'rgba(8, 14, 28, 0.98)');
        ctx.fillStyle = grad;
        ctx.fillRect(b.x + 10, h - shaftH, 8, shaftH);
        ctx.beginPath();
        ctx.ellipse(cx, h - shaftH - 18, 14, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx, h - shaftH - 42, 9, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(245, 200, 66, 0.25)';
        ctx.beginPath();
        ctx.ellipse(cx, h - shaftH - 18, 14, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(232, 168, 56, 0.35)';
        ctx.fillRect(b.x, h - shaftH, b.width, 2);
        return;
      }
      const grad = ctx.createLinearGradient(b.x, y, b.x + b.width, h);
      grad.addColorStop(0, 'rgba(18, 30, 52, 0.92)');
      grad.addColorStop(1, 'rgba(6, 12, 24, 0.96)');
      ctx.fillStyle = grad;
      ctx.fillRect(b.x, y, b.width, b.height);
      ctx.fillStyle = 'rgba(232, 168, 56, 0.2)';
      ctx.fillRect(b.x, y, b.width, 1.5);
    },

    _draw(time) {
      const ctx = this.ctx;
      const w = this.canvas.clientWidth;
      const h = this.canvas.clientHeight;
      const t = time / 1000;
      ctx.clearRect(0, 0, w, h);

      // 建筑主体
      for (const b of this.buildings) this._drawBuilding(ctx, b, h);

      // 窗户灯光（慢速呼吸闪烁）
      for (const win of this.windows) {
        const flicker = 0.42 + 0.58 * (0.5 + 0.5 * Math.sin(t * win.speed + win.phase));
        const alpha = this.reducedMotion ? 0.55 : flicker * 0.85;
        ctx.fillStyle = `rgba(245, 200, 66, ${alpha})`;
        ctx.fillRect(win.x, win.y, win.size, win.size + 1);
        if (alpha > 0.6) {
          ctx.fillStyle = `rgba(255, 220, 140, ${alpha * 0.25})`;
          ctx.fillRect(win.x - 1, win.y - 1, win.size + 2, win.size + 3);
        }
      }

      // 水面倒影微光
      const shimmer = this.reducedMotion ? 0.1 : 0.08 + 0.04 * Math.sin(t * 0.25);
      ctx.fillStyle = `rgba(232, 168, 56, ${shimmer})`;
      ctx.fillRect(0, h - 6, w, 6);
      for (const b of this.buildings) {
        const reflectH = Math.min(18, b.height * 0.08);
        ctx.fillStyle = 'rgba(232, 168, 56, 0.06)';
        ctx.fillRect(b.x, h - reflectH, b.width, reflectH);
      }
    },

    _loop(time) {
      this._draw(time);
      this.animId = requestAnimationFrame((t) => this._loop(t));
    }
  };

  // ========== AudioEngine ==========
  const AudioEngine = {
    ctx: null, muted: false, sounds: {},

    init() {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      var saved = localStorage.getItem('lottery_muted');
      if (saved === 'true') this.setMuted(true);
      this._loadSounds();
    },

    _loadSounds() {
      for (var name of ['draw', 'bingo', 'win']) {
        var audio = new Audio('sounds/' + name + '.mp3');
        audio.preload = 'auto';
        audio.oncanplaythrough = function(n) {
          return function() { console.log('Sound ready: ' + n + '.mp3'); };
        }(name);
        audio.onerror = function(n, self) {
          return function() {
            console.warn('Sound "' + n + '.mp3" not found');
            self.sounds[n] = null;
          };
        }(name, this);
        this.sounds[name] = audio;
        audio.load();
      }
    },

    _hasSound(name) {
      var s = this.sounds[name];
      return s && s.readyState >= 2;
    },

    _ensure() {
      if (!this.ctx) this.init();
      if (this.ctx.state === 'suspended') this.ctx.resume();
    },

    setMuted(m) {
      this.muted = m;
      localStorage.setItem('lottery_muted', String(m));
      document.getElementById('btnMute').textContent = m ? '🔇' : '🔊';
    },

    toggleMute() { this.setMuted(!this.muted); },

    // Tick is no longer needed — draw.mp3 covers the entire spinning phase
    playTick() {},

    // ---- startHum: draw.mp3 loop ----
    startHum() {
      if (this.muted) return; this._ensure();
      if (this._hasSound('draw')) {
        var a = this.sounds['draw']; a.loop = true; a.currentTime = 0; a.play();
      }
    },

    // ---- stopHum: stop draw.mp3 ----
    stopHum() {
      if (this._hasSound('draw')) {
        var a = this.sounds['draw']; a.pause(); a.currentTime = 0;
      }
    },

    // ---- playReveal: bingo.mp3 one-shot ----
    playReveal() {
      if (this.muted) return; this._ensure();
      if (this._hasSound('bingo')) {
        var a = this.sounds['bingo']; a.currentTime = 0; a.play();
      }
    },

    // ---- playCelebrate: win.mp3 loop ----
    playCelebrate() {
      if (this.muted) return; this._ensure();
      if (this._hasSound('win')) {
        var a = this.sounds['win']; a.loop = true; a.currentTime = 0; a.play();
      }
    },

    // ---- stopWin: stop win.mp3 loop ----
    stopWin() {
      if (this._hasSound('win')) {
        var a = this.sounds['win']; a.pause(); a.currentTime = 0;
      }
    },

    // ---- playVoid: no MP3, but keep method for compatibility ----
    playVoid() {}
  };

  // ========== DrawEngine ==========
  const DrawEngine = {
    canvas: null, ctx: null, running: false, animId: null,
    names: [], targetName: '', currentOffset: 0, speed: 0,
    phase: 'idle', flashAlpha: 0, FONT_SIZE: 72, CARD_HEIGHT: 100, VISIBLE_SLOTS: 7,

    init() {
      this.canvas = document.getElementById('animCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.ctx.textAlign = 'center';
      this.ctx.textBaseline = 'middle';
    },

    startSpin(candidates, winnerName, onComplete) {
      this.names = [...candidates].sort(() => Math.random() - 0.5);
      if (!this.names.includes(winnerName)) this.names.push(winnerName);
      this.names = this.names.sort(() => Math.random() - 0.5);
      this.targetName = winnerName;
      this.speed = 18; this.currentOffset = 0;
      this.phase = 'spinning'; this.flashAlpha = 0;
      this.running = true; this._onComplete = onComplete;
      AudioEngine.startHum();
      this._tick();
    },

    // Called by LotteryView when user clicks stop button.
    // Pre-computes a smooth cubic ease-out curve that lands exactly on targetName.
    triggerStop() {
      if (this.phase !== 'spinning') return;
      // Find where targetName should land
      var targetIdx = this.names.indexOf(this.targetName);
      if (targetIdx < 0) targetIdx = 0;
      var cycleLen = this.names.length * this.CARD_HEIGHT;
      // Target position is targetIdx * CARD_HEIGHT, in some future cycle
      var targetInCycle = targetIdx * this.CARD_HEIGHT;
      // Calculate how far ahead to aim: enough cycles to cover ~2s of deceleration
      // At speed 18, cubic ease-out covers ~1/3 speed * duration frames ≈ 18/3 * 140 ≈ 840px
      var estDist = this.speed * 50; // rough decel distance
      var rawTarget = this.currentOffset + estDist;
      // Snap to the next occurrence of targetInCycle after rawTarget
      var cyclesAhead = Math.ceil((rawTarget - targetInCycle) / cycleLen);
      if (cyclesAhead < 2) cyclesAhead = 2; // at least 2 cycles ahead for visual effect
      this._decelTarget = cyclesAhead * cycleLen + targetInCycle;
      this._decelStartOffset = this.currentOffset;
      this._decelDistance = this._decelTarget - this._decelStartOffset;
      // Duration: enough frames to cover the distance with cubic ease-out
      // distance = speed * duration / 3  =>  duration = 3 * distance / speed
      this._decelFrames = Math.max(60, Math.floor(3 * this._decelDistance / this.speed));
      this._decelFrame = 0;
      this.phase = 'decelerating';
    },

    _tick() {
      if (!this.running) return;
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      ctx.fillStyle = 'rgba(5, 11, 24, 0.5)'; ctx.fillRect(0, 0, w, h);
      if (this.phase === 'spinning') {
        this.currentOffset += this.speed;
        if (Math.floor(this.currentOffset / this.CARD_HEIGHT) !==
            Math.floor((this.currentOffset - this.speed) / this.CARD_HEIGHT)) AudioEngine.playTick();
      } else if (this.phase === 'decelerating') {
        // Cubic ease-out: f(t) = 1 - (1 - t)^3
        this._decelFrame++;
        var t = Math.min(this._decelFrame / this._decelFrames, 1.0);
        var eased = 1 - Math.pow(1 - t, 3);
        this.currentOffset = this._decelStartOffset + this._decelDistance * eased;
        if (Math.floor(this.currentOffset / this.CARD_HEIGHT) !==
            Math.floor((this.currentOffset - (this._decelDistance / this._decelFrames * 3)) / this.CARD_HEIGHT)) {
          AudioEngine.playTick();
        }
        if (t >= 1.0) {
          this.currentOffset = this._decelTarget;
          this.phase = 'reveal';
          AudioEngine.stopHum();
          this._onReveal();
        }
      }
      this._drawSlots(ctx, w, h);
      if (this.flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.flashAlpha})`;
        ctx.fillRect(0, 0, w, h); this.flashAlpha *= 0.85;
        if (this.flashAlpha < 0.01) this.flashAlpha = 0;
      }
      this.animId = requestAnimationFrame(() => this._tick());
    },


    _drawSlots(ctx, w, h) {
      const cx = w / 2, cy = h / 2, offset = this.currentOffset, cardH = this.CARD_HEIGHT;
      const windowH = cardH * this.VISIBLE_SLOTS, cardW = Math.min(w * 0.6, 600);
      for (let i = -5; i < this.VISIBLE_SLOTS + 5; i++) {
        const rawIdx = Math.floor((offset + i * cardH) / cardH);
        const ni = ((rawIdx % this.names.length) + this.names.length) % this.names.length;
        const y = cy + i * cardH - (offset % cardH);
        const name = this.names[ni] || '';
        const dist = Math.abs(y - cy) / (windowH / 2);
        const alpha = Math.max(0.15, 1 - dist * 0.85);
        const scale = Math.max(0.6, 1 - dist * 0.4);
        ctx.save(); ctx.translate(cx, y); ctx.scale(scale, scale);
        const grad = ctx.createLinearGradient(-cardW/2, 0, cardW/2, 0);
        const isCenter = Math.abs(y - cy) < cardH * 0.2;
        const isTargetCard = this.phase === 'reveal' && name === this.targetName;
        const isWinner = this.phase === 'reveal' && isCenter;
        grad.addColorStop(0, isWinner ? 'rgba(232,168,56,0.3)' : 'rgba(232,168,56,0.05)');
        grad.addColorStop(1, isWinner ? 'rgba(232,168,56,0.3)' : 'rgba(200,138,32,0.04)');
        ctx.fillStyle = grad; ctx.fillRect(-cardW/2, -cardH/2, cardW, cardH);
        ctx.strokeStyle = isWinner ? `rgba(245,200,66,${alpha})` : `rgba(232,168,56,${alpha * 0.35})`;
        ctx.lineWidth = isWinner ? 3 : 1; ctx.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
        ctx.fillStyle = isWinner ? `rgba(245,200,66,${alpha})` : `rgba(255,255,255,${alpha})`;
        ctx.font = `bold ${this.FONT_SIZE * 0.8}px 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif`;
        if (dist < 0.5) {
          ctx.shadowColor = isWinner ? 'rgba(245,200,66,0.6)' : 'rgba(255,180,60,0.35)';
          ctx.shadowBlur = 20;
        }
        ctx.fillText(name, 0, 0); ctx.shadowBlur = 0; ctx.restore();
      }
      const lineGrad = ctx.createLinearGradient(0, cy - 2, 0, cy + 2);
      lineGrad.addColorStop(0, 'rgba(232,168,56,0)');
      lineGrad.addColorStop(0.5, 'rgba(245,200,66,0.55)');
      lineGrad.addColorStop(1, 'rgba(232,168,56,0)');
      ctx.fillStyle = lineGrad; ctx.fillRect(cx - 320, cy - 2, 640, 4);
    },

    _onReveal() {
      this.flashAlpha = 0.8;
      AudioEngine.playReveal();
      ParticleEngine.burst(window.innerWidth / 2, window.innerHeight / 2, 80);
      setTimeout(() => {
        this.running = false; cancelAnimationFrame(this.animId);
        this.phase = 'winner';
        if (this._onComplete) { const cb = this._onComplete; this._onComplete = null; cb(); }
      }, 1500);
    },

    showWinner(name, prizeName) {
      var self = this;
      this._winnerName = name;
      this._winnerPrize = prizeName;
      this._winnerStartTime = performance.now();
      this._drawWinnerFrame();
    },

    _drawWinnerFrame() {
      var ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      var elapsed = (performance.now() - this._winnerStartTime) / 1000;
      ctx.fillStyle = 'rgba(5, 11, 24, 0.75)'; ctx.fillRect(0, 0, w, h);

      // Prize label
      ctx.fillStyle = 'rgba(245, 200, 66, 0.95)';
      ctx.font = 'bold 32px "Noto Serif SC", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(255, 180, 60, 0.6)'; ctx.shadowBlur = 20;
      ctx.fillText(this._winnerPrize + ' 中奖者', w / 2, h * 0.22); ctx.shadowBlur = 0;

      // Winner name with flowing light sweep
      var nameY = h / 2;
      ctx.font = 'bold 96px "Noto Serif SC", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
      ctx.textAlign = 'center';

      // Base gold fill
      ctx.fillStyle = '#F5C842';
      ctx.shadowColor = 'rgba(255, 180, 60, 0.6)'; ctx.shadowBlur = 30;
      ctx.fillText(this._winnerName, w / 2, nameY);

      // Flowing light sweep: a bright gradient that moves across the text
      var sweepX = w / 2 + Math.sin(elapsed * 2.5) * w * 0.55;
      var sweepGrad = ctx.createLinearGradient(sweepX - 120, 0, sweepX + 120, 0);
      sweepGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
      sweepGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.7)');
      sweepGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');

      ctx.fillStyle = sweepGrad;
      ctx.shadowColor = 'rgba(255, 255, 255, 0.9)'; ctx.shadowBlur = 18;
      ctx.fillText(this._winnerName, w / 2, nameY);
      ctx.shadowBlur = 0;

      // Sparkle particles around the name
      var sparkleCount = 12;
      for (var i = 0; i < sparkleCount; i++) {
        var angle = (Math.PI * 2 * i / sparkleCount) + elapsed * 0.8;
        var radius = 140 + Math.sin(elapsed * 3 + i) * 30;
        var sx = w / 2 + Math.cos(angle) * radius;
        var sy = nameY + Math.sin(angle) * radius * 0.4;
        var sparkleAlpha = 0.3 + Math.sin(elapsed * 5 + i * 2) * 0.5;
        if (sparkleAlpha < 0) sparkleAlpha = 0;
        ctx.beginPath(); ctx.arc(sx, sy, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 220, ' + sparkleAlpha + ')';
        ctx.fill();
        ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 180, 60, ' + (sparkleAlpha * 0.35) + ')';
        ctx.fill();
      }

      // Continue animation
      var self = this;
      this._winnerAnimId = requestAnimationFrame(function() { self._drawWinnerFrame(); });
    },

    stopWinnerAnimation() {
      if (this._winnerAnimId) { cancelAnimationFrame(this._winnerAnimId); this._winnerAnimId = null; }
    },

    playVoidAnimation(name, onComplete) {
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      let alpha = 1, strikeX = 0;
      AudioEngine.playVoid();
      const anim = () => {
        ctx.fillStyle = 'rgba(5, 11, 24, 0.7)'; ctx.fillRect(0, 0, w, h);
        alpha -= 0.02; strikeX += 12;
        ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`;
        ctx.font = 'bold 96px "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(name, w / 2, h / 2);
        if (strikeX < w * 0.6) {
          ctx.strokeStyle = `rgba(239, 68, 68, ${alpha + 0.2})`; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(w / 2 - strikeX, h / 2 + 10);
          ctx.lineTo(w / 2 - strikeX + w * 0.5, h / 2 - 20); ctx.stroke();
        }
        if (alpha <= 0) { ctx.clearRect(0, 0, w, h); if (onComplete) onComplete(); return; }
        requestAnimationFrame(anim);
      }; anim();
    },

    clear() {
      this.running = false;
      if (this.animId) cancelAnimationFrame(this.animId);
      this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  };

  // ========== LotteryView ==========
  const LotteryView = {
    _currentWinner: null,

    init() {
      var self = this;
      document.getElementById('btnStartDraw').addEventListener('click', function() { self.startDraw(); });
      document.getElementById('btnStopDraw').addEventListener('click', function() { self._onStopClick(); });
      document.getElementById('btnConfirm').addEventListener('click', function() { self.confirmWinner(); });
      document.getElementById('btnVoid').addEventListener('click', function() { self.voidWinner(); });
      document.getElementById('btnNextPrize').addEventListener('click', function() { self._onNextPrize(); });
    },

    show() {
      ViewController.switchTo('view-lottery');
      const state = StateManager.state;
      if (state.currentPrizeIdx >= state.config.length) { ResultsView.show(); return; }
      if (state.candidates.length === 0) {
        alert('候选池已无可用人员，抽奖终止'); ResultsView.show(); return;
      }
      this._renderStandby();
      ParticleEngine.setMode('idle'); DrawEngine.clear();
    },

    _renderStandby() {
      const s = StateManager.state, prize = s.config[s.currentPrizeIdx];
      document.getElementById('lotteryPrizeName').textContent = `🏆 ${prize.name}`;
      document.getElementById('lotteryProgress').textContent = `已抽出 ${s.currentSlotIdx}/${prize.count} 人`;
      document.getElementById('standbyNext').textContent = `准备抽取：${prize.name} 第 ${s.currentSlotIdx + 1} 位`;
      document.getElementById('standbyRemaining').textContent = `剩余候选：${s.candidates.length} 人`;
      const drawn = s.winners.filter(w => w.prize === prize.name).slice(-prize.count);
      document.getElementById('standbyDrawn').innerHTML = drawn.map(w => `<span class="drawn-tag">${this._esc(w.name)}</span>`).join('');
      document.getElementById('lotteryStandby').style.display = 'block';
      document.getElementById('lotteryActions').style.display = 'none';
    },

    startDraw() {
      var candidates = StateManager.state.candidates;
      if (!candidates.length) { alert('候选池已无可用人员'); return; }
      document.getElementById('lotteryStandby').style.display = 'none';
      document.getElementById('lotteryActions').style.display = 'none';
      // Show stop button
      document.getElementById('lotteryStopArea').style.display = 'flex';
      ParticleEngine.setMode('accelerate');
      if (candidates.length === 1) { this._currentWinner = candidates[0]; this._showWinnerScreen(); return; }
      var idx = Math.floor(Math.random() * candidates.length);
      this._currentWinner = candidates[idx];
      var self = this;
      DrawEngine.startSpin(candidates, this._currentWinner, function() { self._showWinnerScreen(); });
    },

    _onStopClick() {
      document.getElementById('lotteryStopArea').style.display = 'none';
      DrawEngine.triggerStop();
    },

    _showWinnerScreen() {
      ParticleEngine.setMode('burst');
      DrawEngine.stopWinnerAnimation();
      DrawEngine.showWinner(this._currentWinner, StateManager.state.config[StateManager.state.currentPrizeIdx].name);
      AudioEngine.playCelebrate();
      document.getElementById('lotteryActions').style.display = 'flex';
    },

    confirmWinner() {
      var s = StateManager.state, prize = s.config[s.currentPrizeIdx];
      var idx = s.candidates.indexOf(this._currentWinner);
      if (idx !== -1) s.candidates.splice(idx, 1);
      s.winners.push({
        name: this._currentWinner, prize: prize.name,
        time: new Date().toLocaleString('zh-CN', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false })
      });
      s.currentSlotIdx++; StateManager.save();
      AudioEngine.stopWin(); DrawEngine.stopWinnerAnimation(); DrawEngine.clear(); ParticleEngine.setMode('idle');
      if (s.currentSlotIdx >= prize.count) {
        // Prize complete - show prize summary before next
        this._showPrizeSummary(prize);
      } else {
        this._renderStandby();
      }
    },

    _showPrizeSummary(prize) {
      var s = StateManager.state;
      var winners = s.winners.filter(function(w) { return w.prize === prize.name; });
      document.getElementById('lotteryPrizeName').textContent = '';
      document.getElementById('lotteryProgress').textContent = '';
      document.getElementById('lotteryStandby').style.display = 'none';
      document.getElementById('lotteryActions').style.display = 'none';
      document.getElementById('lotteryStopArea').style.display = 'none';
      var summary = document.getElementById('prizeSummary');
      document.getElementById('summaryPrizeName').textContent = prize.name + ' 中奖名单';
      document.getElementById('summaryWinnerList').innerHTML = winners.map(function(w, i) {
        return '<div class="summary-winner-card"><span class="summary-num">#' + (i + 1) + '</span><span class="summary-name">' + LotteryView._esc(w.name) + '</span></div>';
      }).join('');
      document.getElementById('btnNextPrize').textContent = s.currentPrizeIdx + 1 < s.config.length
        ? '进入下一个奖项 →'
        : '查看全部结果 →';
      summary.style.display = 'flex';
    },

    _onNextPrize() {
      var s = StateManager.state;
      s.currentPrizeIdx++; s.currentSlotIdx = 0; StateManager.save();
      document.getElementById('prizeSummary').style.display = 'none';
      if (s.currentPrizeIdx >= s.config.length) { ResultsView.show(); return; }
      this._renderStandby();
    },

    voidWinner() {
      var s = StateManager.state;
      var idx = s.candidates.indexOf(this._currentWinner);
      if (idx !== -1) s.candidates.splice(idx, 1);
      StateManager.save();
      AudioEngine.stopWin(); DrawEngine.stopWinnerAnimation();
      var self = this;
      DrawEngine.playVoidAnimation(this._currentWinner, function() {
        if (!s.candidates.length) {
          alert('候选池已无可用人员，该奖项剩余名额无法继续抽取');
          s.currentPrizeIdx++; s.currentSlotIdx = 0; StateManager.save();
          if (s.currentPrizeIdx >= s.config.length) { ResultsView.show(); return; }
        }
        DrawEngine.clear(); ParticleEngine.setMode('idle'); self._renderStandby();
      });
    },

    _esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; },
    hide() { document.getElementById('view-lottery').classList.remove('active'); DrawEngine.clear(); }
  };

  // ========== ResultsView ==========
  const ResultsView = {
    init() {
      document.getElementById('btnExport').addEventListener('click', () => this.exportCSV());
      document.getElementById('btnPrint').addEventListener('click', () => window.print());
      document.getElementById('btnReset').addEventListener('click', () => this.resetAll());
    },

    show() {
      ViewController.switchTo('view-results');
      const winners = StateManager.state.winners, config = StateManager.state.config;
      const grouped = {};
      for (const p of config) grouped[p.name] = winners.filter(w => w.prize === p.name);
      document.getElementById('resultsList').innerHTML = config.map(p => {
        const list = grouped[p.name] || [];
        return `<div class="prize-group"><h2>🏆 ${this._esc(p.name)}（${list.length}/${p.count}）</h2>
          <div class="winner-cards">${list.map(w => `<span class="winner-card">★ ${this._esc(w.name)}</span>`).join('')}
          ${!list.length ? '<span style="color:var(--text-dim);">暂无中奖者</span>' : ''}</div></div>`;
      }).join('');
      document.getElementById('resultsTotal').textContent = `共计抽出：${winners.length} 人`;
    },

    exportCSV() {
      const winners = StateManager.state.winners;
      const csv = '﻿奖项,姓名,中奖时间\n' + winners.map(w => `"${w.prize}","${w.name}","${w.time}"`).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob), a = document.createElement('a');
      a.href = url; a.download = `lottery-results-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    },

    resetAll() {
      if (confirm('确定要重置全部数据吗？此操作不可恢复！')) {
        if (confirm('再次确认：所有中奖记录和名单将被清除')) { StateManager.reset(); ConfigView.show(); }
      }
    },

    _esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; },
    hide() { document.getElementById('view-results').classList.remove('active'); }
  };

  // ========== App Initialization ==========
  (function App() {
    checkRestore();
    ParticleEngine.init();
    SkylineEngine.init();
    DrawEngine.init();
    ConfigView.init();
    ImportView.init();
    LotteryView.init();
    ResultsView.init();

    document.getElementById('btnMute').addEventListener('click', () => {
      if (!AudioEngine.ctx) AudioEngine.init();
      AudioEngine.toggleMute();
    });

    document.addEventListener('click', function initAudio() {
      if (!AudioEngine.ctx) AudioEngine.init();
    }, { once: true });

    const state = StateManager.state;
    if (state.config.length === 0) { ConfigView.show(); }
    else if (state.candidates.length === 0) { ImportView.show(); }
    else if (state.currentPrizeIdx < state.config.length) { LotteryView.show(); }
    else { ResultsView.show(); }
  })();
  </script>
</body>
</html>
