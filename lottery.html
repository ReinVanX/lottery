<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医焕安 · 年会抽奖</title>
  <style>
    /* === CSS Reset & Variables (NEXTROVE 海报风格) === */
    :root {
      --bg-deep: #001428;
      --bg-mid: #0A3D5C;
      --teal: #00C2CB;
      --teal-bright: #00E5EE;
      --blue: #0088CC;
      --gold: #FFD966;
      --text: #FFFFFF;
      --text-dim: #8BB8CC;
      --text-muted: #5A8FA8;
      --card-bg: rgba(0, 26, 51, 0.72);
      --border: rgba(0, 194, 203, 0.35);
      --glow: 0 0 24px rgba(0, 194, 203, 0.45);
      --gold-glow: 0 0 30px rgba(255, 217, 102, 0.5);
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --font-sans: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'PingFang SC', 'Source Han Sans SC', 'Microsoft YaHei', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(180deg, #0A4D6E 0%, var(--bg-deep) 42%, #000D1A 100%);
      color: var(--text);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* === 背景装饰层（电路纹理 + 年份水印） === */
    #bgDecor {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #bgDecor::before {
      content: '2026';
      position: absolute;
      left: -2%;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(180px, 28vw, 360px);
      font-weight: 900;
      color: rgba(0, 194, 203, 0.04);
      letter-spacing: -0.02em;
      line-height: 1;
      font-family: var(--font-display);
    }
    #bgDecor::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(0, 194, 203, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 25% at 10% 80%, rgba(0, 136, 204, 0.08) 0%, transparent 70%);
    }
    .circuit-lines {
      position: absolute;
      inset: 0;
      opacity: 0.35;
    }
    .circuit-lines svg {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    /* === Canvas Layer === */
    #animCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* === View Containers === */
    .view {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .view.active { display: flex; }

    /* === Shared Components === */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px 48px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border: 1px solid var(--teal);
      border-radius: 4px;
      background: rgba(0, 194, 203, 0.08);
      color: var(--teal-bright);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: var(--font-sans);
      position: relative;
    }
    .btn:hover {
      background: rgba(0, 194, 203, 0.18);
      box-shadow: var(--glow);
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%);
      border-color: var(--teal-bright);
      color: #fff;
      box-shadow: var(--glow);
      font-size: 20px;
      padding: 16px 48px;
      letter-spacing: 0.05em;
    }
    .btn.primary:hover {
      box-shadow: 0 0 32px rgba(0, 229, 238, 0.55);
    }
    .btn.danger {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }
    .btn.gold {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(255, 217, 102, 0.1);
      box-shadow: var(--gold-glow);
    }

    .title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .title-accent {
      color: var(--teal-bright);
      text-shadow: 0 0 20px rgba(0, 229, 238, 0.4);
    }
    .brand-slogan {
      font-size: 16px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-bottom: 24px;
      text-align: center;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-dim);
      margin-bottom: 32px;
      text-align: center;
    }

    /* === Mute Button === */
    #btnMute {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #btnMute:hover { color: var(--teal-bright); border-color: var(--teal); }

    /* === Config Table === */
    #configTable {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
    }
    #configTable th, #configTable td {
      padding: 12px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    #configTable th {
      color: var(--teal-bright);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #configTable input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 16px;
      text-align: center;
      width: 160px;
      font-family: var(--font-sans);
      transition: border-color 0.2s;
    }
    #configTable input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 8px rgba(0, 194, 203, 0.25);
    }
    #configTable input[name="prizeCount"] { width: 80px; }
    .btn-del {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .btn-del:hover { color: #ef4444; border-color: #ef4444; }

    /* === Drop Zone === */
    #dropZone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    #dropZone:hover, #dropZone.dragover {
      border-color: var(--teal);
      background: rgba(0, 194, 203, 0.04);
      box-shadow: inset 0 0 40px rgba(0, 194, 203, 0.05);
    }

    /* === Preview List === */
    #previewList {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .name-tag {
      padding: 6px 14px;
      background: rgba(0, 194, 203, 0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text);
    }

    /* === Lottery View (NEXTROVE 年会风格) === */
    #brandHeader {
      position: fixed;
      top: 24px;
      left: 40px;
      z-index: 10;
      text-align: left;
    }
    .brand-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .brand-event {
      font-family: var(--font-display);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .brand-slogan-inline {
      font-size: 14px;
      color: var(--teal-bright);
      letter-spacing: 0.08em;
      margin-top: 4px;
      opacity: 0.85;
    }

    #lotteryInfo {
      position: fixed;
      top: 28px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #lotteryPrizeName {
      font-family: var(--font-display);
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 800;
      color: var(--teal-bright);
      text-shadow: 0 0 24px rgba(0, 229, 238, 0.45);
      letter-spacing: 0.06em;
    }
    #lotteryProgress {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 8px;
      letter-spacing: 0.1em;
    }
    #lotteryStandby {
      text-align: center;
      z-index: 10;
    }
    .bracket-frame {
      position: relative;
      padding: 48px 72px 40px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      max-width: 720px;
    }
    .bracket-frame::before,
    .bracket-frame::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--teal-bright);
      border-style: solid;
      pointer-events: none;
    }
    .bracket-frame::before {
      top: -1px; left: -1px;
      border-width: 3px 0 0 3px;
      box-shadow: -2px -2px 12px rgba(0, 229, 238, 0.3);
    }
    .bracket-frame::after {
      top: -1px; right: -1px;
      border-width: 3px 3px 0 0;
      box-shadow: 2px -2px 12px rgba(0, 229, 238, 0.3);
    }
    .bracket-corner-bl,
    .bracket-corner-br {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--teal-bright);
      border-style: solid;
      pointer-events: none;
    }
    .bracket-corner-bl {
      bottom: -1px; left: -1px;
      border-width: 0 0 3px 3px;
      box-shadow: -2px 2px 12px rgba(0, 229, 238, 0.3);
    }
    .bracket-corner-br {
      bottom: -1px; right: -1px;
      border-width: 0 3px 3px 0;
      box-shadow: 2px 2px 12px rgba(0, 229, 238, 0.3);
    }
    .bracket-label {
      font-size: 13px;
      color: var(--teal);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #lotteryStandby p { margin-bottom: 12px; }
    #standbyNext {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }
    #standbyRemaining {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    #standbyDrawn {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 80vw;
    }
    .drawn-tag {
      padding: 8px 18px;
      background: rgba(255, 217, 102, 0.1);
      border: 1px solid rgba(255, 217, 102, 0.35);
      border-radius: 4px;
      font-size: 16px;
      color: var(--gold);
      box-shadow: 0 0 12px rgba(255, 217, 102, 0.12);
    }
    #lotteryActions {
      position: fixed;
      bottom: 50px;
      left: 0;
      width: 100%;
      display: flex;
      gap: 24px;
      justify-content: center;
      z-index: 10;
    }
    #lotteryActions .btn {
      min-width: 200px;
      justify-content: center;
    }

    /* === Results View === */
    .prize-group {
      margin-bottom: 24px;
    }
    .prize-group h2 {
      color: var(--teal-bright);
      font-size: 24px;
      margin-bottom: 12px;
      text-align: center;
    }
    .winner-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .winner-card {
      padding: 12px 24px;
      background: rgba(255, 217, 102, 0.1);
      border: 1px solid rgba(255, 217, 102, 0.35);
      border-radius: 4px;
      font-size: 18px;
      color: var(--gold);
      font-weight: 600;
      box-shadow: 0 0 16px rgba(255, 217, 102, 0.15);
    }

    /* Prize Summary Cards */
    .summary-winner-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 28px;
      background: rgba(255, 217, 102, 0.08);
      border: 1px solid rgba(255, 217, 102, 0.25);
      border-radius: 14px;
      animation: summaryFadeIn 0.5s ease both;
    }
    .summary-num {
      font-size: 18px; color: rgba(255, 217, 102, 0.5); font-weight: 700;
      min-width: 32px;
    }
    .summary-name {
      font-size: 24px; color: #FFD966; font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 217, 102, 0.4);
    }
    @keyframes summaryFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Print Styles === */
    @media (prefers-reduced-motion: reduce) {
      .btn, .bracket-frame, #bgDecor::before { transition: none; animation: none; }
    }

    @media print {
      body { background: #fff; color: #000; }
      #animCanvas, .btn, #btnMute { display: none !important; }
      .view { position: static; display: block !important; }
      .panel { border: 1px solid #ccc; box-shadow: none; background: #fff; }
      .title { color: #000; }
    }
  </style>
</head>
<body>
  <div id="bgDecor" aria-hidden="true">
    <div class="circuit-lines">
      <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00C2CB" stop-opacity="0"/>
            <stop offset="50%" stop-color="#00E5EE" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#00C2CB" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <circle cx="1680" cy="120" r="60" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
        <circle cx="1680" cy="120" r="90" fill="none" stroke="rgba(0,194,203,0.15)" stroke-width="0.5"/>
        <line x1="1620" y1="120" x2="120" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
        <line x1="1680" y1="60" x2="1680" y2="400" stroke="rgba(0,194,203,0.2)" stroke-width="0.5"/>
        <circle cx="120" cy="120" r="4" fill="#00E5EE" opacity="0.6"/>
        <circle cx="1680" cy="120" r="4" fill="#00E5EE" opacity="0.8"/>
        <line x1="200" y1="900" x2="600" y2="900" stroke="url(#lineGrad)" stroke-width="0.8"/>
        <line x1="600" y1="900" x2="600" y2="820" stroke="rgba(0,194,203,0.25)" stroke-width="0.5"/>
        <circle cx="600" cy="820" r="3" fill="#00C2CB" opacity="0.5"/>
      </svg>
    </div>
  </div>
  <canvas id="animCanvas"></canvas>
  <button id="btnMute" title="静音/取消静音">🔊</button>

  <!-- View 1: Config -->
  <div id="view-config" class="view active">
    <div class="panel">
      <h1 class="title"><span class="title-accent">NEXTROVE</span> · 年会抽奖</h1>
      <p class="brand-slogan">「智联全球 警戒未来」</p>
      <p class="subtitle">第一步：设置奖项</p>
      <table id="configTable">
        <thead><tr><th>奖项名称</th><th>中奖人数</th><th>操作</th></tr></thead>
        <tbody id="configBody"></tbody>
      </table>
      <div style="text-align:center;margin:16px 0;">
        <button id="btnAddPrize" class="btn">+ 添加奖项</button>
      </div>
      <p id="configSummary" style="text-align:center;color:var(--text-dim);margin-bottom:20px;"></p>
      <div style="text-align:center;">
        <button id="btnConfigNext" class="btn primary">保存并进入下一步 →</button>
      </div>
    </div>
  </div>

  <!-- View 2: Import -->
  <div id="view-import" class="view">
    <div class="panel">
      <h1 class="title"><span class="title-accent">NEXTROVE</span> · 导入名单</h1>
      <p class="brand-slogan">「智联全球 警戒未来」</p>
      <p class="subtitle">第二步：上传签到名单</p>
      <div id="dropZone">
        <p style="font-size:48px;margin-bottom:12px;">📁</p>
        <p style="font-size:20px;color:var(--teal-bright);">拖拽文件到此处</p>
        <p style="color:var(--text-dim);margin-top:8px;">或点击选择 CSV / Excel 文件</p>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" hidden>
      </div>
      <div id="importError" style="color:#ef4444;text-align:center;margin:12px 0;display:none;"></div>
      <div id="previewArea" style="display:none;">
        <p id="previewCount" style="text-align:center;color:var(--teal-bright);margin-bottom:12px;"></p>
        <div id="previewList" style="max-height:300px;overflow-y:auto;"></div>
      </div>
      <div style="text-align:center;margin-top:20px;">
        <button id="btnImportBack" class="btn">← 返回</button>
        <button id="btnImportNext" class="btn primary" style="display:none;">确认名单，共 <span id="importCount">0</span> 人 →</button>
      </div>
    </div>
  </div>

  <!-- View 3: Lottery -->
  <div id="view-lottery" class="view">
    <div id="brandHeader">
      <div class="brand-logo">NEXTROVE</div>
      <div class="brand-event">医焕安 全球药物警戒年会</div>
      <div class="brand-slogan-inline">「智联全球 警戒未来」</div>
    </div>
    <div id="lotteryInfo">
      <p id="lotteryPrizeName"></p>
      <p id="lotteryProgress"></p>
    </div>
    <div id="lotteryStandby">
      <div class="bracket-frame">
        <span class="bracket-corner-bl" aria-hidden="true"></span>
        <span class="bracket-corner-br" aria-hidden="true"></span>
        <p class="bracket-label">现场抽奖</p>
        <p id="standbyNext"></p>
        <p id="standbyRemaining"></p>
        <button id="btnStartDraw" class="btn primary">开始抽取下一位</button>
        <div id="standbyDrawn" style="margin-top:24px;"></div>
      </div>
    </div>
    <div id="lotteryStopArea" style="display:none;position:fixed;bottom:50px;left:0;width:100%;z-index:20;justify-content:center;">
      <button id="btnStopDraw" class="btn" style="background:rgba(239,68,68,0.15);border-color:#ef4444;color:#ef4444;font-size:24px;padding:18px 56px;">🛑 停 止</button>
    </div>
    <div id="lotteryActions" style="display:none;">
      <button id="btnConfirm" class="btn gold">确认中奖</button>
      <button id="btnVoid" class="btn danger">作废重抽</button>
    </div>
    <!-- Prize Summary Overlay -->
    <div id="prizeSummary" style="display:none;position:fixed;inset:0;z-index:30;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,13,26,0.92);">
      <div class="panel" style="text-align:center;min-width:500px;">
        <h2 id="summaryPrizeName" style="color:#FFD966;font-size:30px;margin-bottom:24px;text-shadow:0 0 20px rgba(255,217,102,0.5);"></h2>
        <div id="summaryWinnerList" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:28px;"></div>
        <button id="btnNextPrize" class="btn primary" style="font-size:20px;"></button>
      </div>
    </div>
  </div>

  <!-- View 4: Results -->
  <div id="view-results" class="view">
    <div class="panel">
      <h1 class="title"><span class="title-accent">NEXTROVE</span> · 中奖结果汇总</h1>
      <p class="brand-slogan">「智联全球 警戒未来」</p>
      <div id="resultsList"></div>
      <p id="resultsTotal" style="text-align:center;color:var(--teal-bright);margin:20px 0;"></p>
      <div style="text-align:center;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
        <button id="btnExport" class="btn primary">📥 导出 CSV</button>
        <button id="btnPrint" class="btn">🖨️ 打印</button>
        <button id="btnReset" class="btn danger">🔄 重置全部数据</button>
      </div>
    </div>
  </div>

  <script>
  // ========== StateManager ==========
  const KEYS = {
    config: 'lottery_config',
    candidates: 'lottery_candidates',
    original: 'lottery_original',
    winners: 'lottery_winners',
    state: 'lottery_state'
  };

  const StateManager = {
    state: {
      config: [],        // [{name: string, count: number}]
      candidates: [],    // string[]
      original: [],      // string[]
      winners: [],       // [{name: string, prize: string, time: string}]
      currentPrizeIdx: 0,
      currentSlotIdx: 0
    },

    save() {
      localStorage.setItem(KEYS.config, JSON.stringify(this.state.config));
      localStorage.setItem(KEYS.candidates, JSON.stringify(this.state.candidates));
      localStorage.setItem(KEYS.original, JSON.stringify(this.state.original));
      localStorage.setItem(KEYS.winners, JSON.stringify(this.state.winners));
      localStorage.setItem(KEYS.state, JSON.stringify({
        currentPrizeIdx: this.state.currentPrizeIdx,
        currentSlotIdx: this.state.currentSlotIdx
      }));
    },

    load() {
      try {
        const config = localStorage.getItem(KEYS.config);
        const candidates = localStorage.getItem(KEYS.candidates);
        const original = localStorage.getItem(KEYS.original);
        const winners = localStorage.getItem(KEYS.winners);
        const st = localStorage.getItem(KEYS.state);
        if (config) this.state.config = JSON.parse(config);
        if (candidates) this.state.candidates = JSON.parse(candidates);
        if (original) this.state.original = JSON.parse(original);
        if (winners) this.state.winners = JSON.parse(winners);
        if (st) {
          const parsed = JSON.parse(st);
          this.state.currentPrizeIdx = parsed.currentPrizeIdx || 0;
          this.state.currentSlotIdx = parsed.currentSlotIdx || 0;
        }
        return !!(config || candidates);
      } catch (e) {
        console.error('StateManager.load failed:', e);
        return false;
      }
    },

    reset() {
      Object.values(KEYS).forEach(k => localStorage.removeItem(k));
      this.state = {
        config: [],
        candidates: [],
        original: [],
        winners: [],
        currentPrizeIdx: 0,
        currentSlotIdx: 0
      };
    },

    hasSavedData() {
      return !!localStorage.getItem(KEYS.config);
    }
  };

  // ========== Simple CSV Parser (replaces Papa Parse) ==========
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQuotes) {
        if (ch === '"') {
          if (text[i + 1] === '"') { cell += '"'; i++; }
          else { inQuotes = false; }
        } else { cell += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(cell); cell = ''; }
        else if (ch === '\n' || (ch === '\r' && text[i + 1] !== '\n')) {
          row.push(cell);
          if (row.some(c => c !== '')) rows.push(row);
          row = []; cell = '';
        } else if (ch !== '\r') { cell += ch; }
      }
    }
    row.push(cell);
    if (row.some(c => c !== '')) rows.push(row);
    return rows;
  }

  // ========== ImportView ==========
  const ImportView = {
    _pendingNames: null,

    init() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault(); dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) this.processFile(file);
      });
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) this.processFile(file);
      });
      document.getElementById('btnImportBack').addEventListener('click', () => ConfigView.show());
      document.getElementById('btnImportNext').addEventListener('click', () => this.confirmImport());
    },

    processFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      document.getElementById('importError').style.display = 'none';
      if (ext !== 'csv') {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '仅支持 CSV 格式（请将 Excel 另存为 CSV UTF-8 编码）';
        return;
      }
      // Try UTF-8 first
      const reader = new FileReader();
      reader.onload = (e) => {
        const text = e.target.result;
        const rows = parseCSV(text);
        const firstCell = (rows[0] && rows[0][0]) || '';
        if (this._looksGarbled(firstCell)) {
          this._readAsGBK(file); return;
        }
        this._handleResult(rows);
      };
      reader.readAsText(file, 'UTF-8');
    },

    _readAsGBK(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const decoder = new TextDecoder('gbk');
        const text = decoder.decode(new Uint8Array(e.target.result));
        this._handleResult(parseCSV(text));
      };
      reader.readAsArrayBuffer(file);
    },

    _looksGarbled(str) {
      const bad = (str.match(/[�\x00-\x08\x0b\x0c\x0e-\x1f]/g) || []).length;
      return bad > str.length * 0.3;
    },

    _handleResult(rows) {
      if (!rows.length) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '未识别到任何姓名';
        return;
      }
      let colIdx = 0;
      let dataRows = rows;
      const header = rows[0];
      const headerStr = (Array.isArray(header) ? header.join(' ') : String(header)).toLowerCase();
      if (headerStr.includes('姓名') || headerStr.includes('名字') || headerStr.includes('name')) {
        for (let i = 0; i < header.length; i++) {
          const h = (header[i] || '').toLowerCase();
          if (h.includes('姓名') || h.includes('名字') || h.includes('name')) { colIdx = i; break; }
        }
        dataRows = rows.slice(1);
      }
      if (dataRows.length && dataRows[0].length) {
        const firstVal = String(dataRows[0][colIdx] || '').trim();
        if (firstVal.length > 10 || firstVal.toLowerCase() === 'name' || firstVal === '姓名') {
          dataRows = dataRows.slice(1);
        }
      }
      const names = dataRows.map(row => String(row[colIdx] || '').trim())
        .filter(name => name.length > 0 && name.length < 50);
      if (!names.length) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent = '未识别到任何姓名，请检查文件格式';
        return;
      }
      const totalNeeded = StateManager.state.config.reduce((s, p) => s + p.count, 0);
      if (names.length < totalNeeded) {
        document.getElementById('importError').style.display = 'block';
        document.getElementById('importError').textContent =
          `名单人数（${names.length}）少于奖项总人数（${totalNeeded}），差额 ${totalNeeded - names.length} 人`;
      }
      const previewArea = document.getElementById('previewArea');
      const previewList = document.getElementById('previewList');
      previewList.innerHTML = names.slice(0, 200)
        .map(n => `<span class="name-tag">${this._esc(n)}</span>`).join('');
      if (names.length > 200) {
        previewList.innerHTML += `<p style="width:100%;text-align:center;color:var(--text-dim);">... 还有 ${names.length - 200} 人</p>`;
      }
      document.getElementById('previewCount').textContent = `共识别 ${names.length} 人`;
      document.getElementById('importCount').textContent = names.length;
      previewArea.style.display = 'block';
      document.getElementById('btnImportNext').style.display = 'inline-flex';
      this._pendingNames = names;
    },

    confirmImport() {
      if (!this._pendingNames || !this._pendingNames.length) return;
      StateManager.state.candidates = [...this._pendingNames];
      StateManager.state.original = [...this._pendingNames];
      StateManager.state.currentPrizeIdx = 0;
      StateManager.state.currentSlotIdx = 0;
      StateManager.state.winners = [];
      StateManager.save();
      this._pendingNames = null;
      LotteryView.show();
    },

    _esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    },

    show() {
      ViewController.switchTo('view-import');
      document.getElementById('previewArea').style.display = 'none';
      document.getElementById('btnImportNext').style.display = 'none';
      document.getElementById('importError').style.display = 'none';
    },

    hide() { document.getElementById('view-import').classList.remove('active'); }
  };

  // ========== ParticleEngine ==========
  const ParticleEngine = {
    canvas: null, ctx: null, particles: [], mode: 'idle', animId: null, PARTICLE_COUNT: 120,

    init() {
      this.canvas = document.getElementById('animCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.resize();
      window.addEventListener('resize', () => this.resize());
      for (let i = 0; i < this.PARTICLE_COUNT; i++) this.particles.push(this._create());
      this._loop();
    },

    resize() {
      const dpr = window.devicePixelRatio || 1;
      this.canvas.width = window.innerWidth * dpr;
      this.canvas.height = window.innerHeight * dpr;
      this.canvas.style.width = window.innerWidth + 'px';
      this.canvas.style.height = window.innerHeight + 'px';
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    },

    setMode(mode) { this.mode = mode; },

    _create() {
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        size: Math.random() * 2.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
        color: Math.random() > 0.5 ? '0, 194, 203' : '0, 136, 204'
      };
    },

    burst(x, y, count) {
      for (let i = 0; i < (count || 60); i++) {
        const angle = (Math.PI * 2 * i) / (count || 60) + (Math.random() - 0.5) * 0.5;
        const speed = Math.random() * 4 + 2;
        this.particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: Math.random() * 3 + 1, alpha: 1, color: '255, 217, 102',
          life: 1, decay: 0.008 + Math.random() * 0.02
        });
      }
    },

    _update() {
      const w = window.innerWidth, h = window.innerHeight, cx = w / 2, cy = h / 2;
      for (let i = this.particles.length - 1; i >= 0; i--) {
        const p = this.particles[i];
        if (p.life !== undefined) {
          p.life -= p.decay; p.x += p.vx; p.y += p.vy; p.vy += 0.02; p.alpha = p.life;
          if (p.life <= 0) { this.particles.splice(i, 1); continue; }
        } else {
          if (this.mode === 'accelerate') {
            const dx = cx - p.x, dy = cy - p.y, dist = Math.sqrt(dx * dx + dy * dy) || 1;
            p.vx += (dx / dist) * 0.03; p.vy += (dy / dist) * 0.03;
            const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (spd > 4) { p.vx = (p.vx / spd) * 4; p.vy = (p.vy / spd) * 4; }
          }
          p.x += p.vx; p.y += p.vy;
          if (p.x < -10) p.x = w + 10; if (p.x > w + 10) p.x = -10;
          if (p.y < -10) p.y = h + 10; if (p.y > h + 10) p.y = -10;
        }
      }
      const ambient = this.particles.filter(p => p.life === undefined).length;
      if (ambient < this.PARTICLE_COUNT) this.particles.push(this._create());
    },

    _draw() {
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      for (const p of this.particles) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`; ctx.fill();
        if (p.life !== undefined && p.life > 0.5) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.color}, ${p.alpha * 0.25})`; ctx.fill();
        }
      }
    },

    _loop() {
      this._update(); this._draw();
      this.animId = requestAnimationFrame(() => this._loop());
    }
  };

  // ========== Audio Helpers ==========
  function _createNoiseBuffer(ctx, duration, color) {
    const sr = ctx.sampleRate, len = Math.max(1, Math.floor(sr * duration));
    const buf = ctx.createBuffer(1, len, sr), data = buf.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      if (color === 'pink') {
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        data[i] = (b0 + b1 + b2 + white * 0.5362) * 0.11;
      } else {
        data[i] = white;
      }
    }
    return buf;
  }

  function _playNoiseHit(ctx, duration, gain, freq, q, dest) {
    const buf = _createNoiseBuffer(ctx, duration, 'pink');
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = q || 0.7;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filter); filter.connect(g); g.connect(dest); src.start();
  }


  // ========== AudioEngine ==========
  const AudioEngine = {
    ctx: null, muted: false, sounds: {}, humNodes: null,

    init() {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      const saved = localStorage.getItem('lottery_muted');
      if (saved === 'true') this.setMuted(true);
      this._loadSounds();
    },

    _loadSounds() {
      for (const name of ['draw', 'bingo', 'win']) {
        const audio = new Audio('sounds/' + name + '.mp3');
        audio.preload = 'auto';
        audio.oncanplaythrough = () => console.log('Sound ready: ' + name + '.mp3');
        audio.onerror = () => {
          console.warn('Sound "' + name + '.mp3" not found, using fallback');
          this.sounds[name] = null;
        };
        this.sounds[name] = audio;
        audio.load();
      }
    },

    _hasSound(name) {
      var s = this.sounds[name];
      return s && s.readyState >= 2;
    },

    setMuted(m) {
      this.muted = m;
      localStorage.setItem('lottery_muted', String(m));
      document.getElementById('btnMute').textContent = m ? '🔇' : '🔊';
    },

    toggleMute() { this.setMuted(!this.muted); },

    _ensure() {
      if (!this.ctx) this.init();
      if (this.ctx.state === 'suspended') this.ctx.resume();
    },

    _dest() { return this.ctx.destination; },

    // ---- playTick: subtle click (synthesis only) ----
    playTick() {
      if (this.muted) return; this._ensure();
      _playNoiseHit(this.ctx, 0.02, 0.06, 2200, 1.5, this._dest());
    },

    // ---- startHum: draw.mp3 loop → synthesis fallback ----
    startHum() {
      if (this.muted) return; this._ensure();
      if (this._hasSound('draw')) {
        var a = this.sounds['draw'];
        a.loop = true; a.currentTime = 0; a.play();
        return;
      }
      var ctx = this.ctx, now = ctx.currentTime;
      var mg = ctx.createGain(); mg.gain.value = 0.04; mg.connect(this._dest());
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 350; lp.Q.value = 0.5; lp.connect(mg);
      var oscs = [-5, 0, 5].map(function(d) {
        var o = ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = 55; o.detune.value = d;
        o.connect(lp); o.start(now); return o;
      });
      var sub = ctx.createOscillator(), sg = ctx.createGain();
      sub.type = 'sine'; sub.frequency.value = 35; sg.gain.value = 0.06;
      sub.connect(sg); sg.connect(mg); sub.start(now);
      this.humNodes = { oscs: oscs, sub: sub, subG: sg, lp: lp, masterGain: mg };
    },

    // ---- stopHum: stop draw.mp3 or synthesis ----
    stopHum() {
      if (this._hasSound('draw')) {
        var a = this.sounds['draw']; a.pause(); a.currentTime = 0; return;
      }
      if (!this.humNodes) return;
      var now = this.ctx.currentTime;
      this.humNodes.masterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      [].concat(this.humNodes.oscs, [this.humNodes.sub]).forEach(function(o) { o.stop(now + 0.45); });
      this.humNodes = null;
    },

    // ---- _playBingo: bingo.mp3 one-shot → synthesis fallback ----
    _playBingo() {
      if (this._hasSound('bingo')) {
        var a = this.sounds['bingo']; a.currentTime = 0; a.play(); return;
      }
      var ctx = this.ctx, now = ctx.currentTime;
      _playNoiseHit(ctx, 0.18, 0.15, 900, 0.8, this._dest());
      [0, 5].forEach(function(det) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(350, now);
        o.frequency.exponentialRampToValueAtTime(1600, now + 0.25);
        o.detune.value = det;
        g.gain.setValueAtTime(0.11, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
        o.connect(g); g.connect(ctx.destination);
        o.start(now); o.stop(now + 0.5);
      });
    },

    playReveal() {
      if (this.muted) return; this._ensure(); this._playBingo();
    },

    // ---- playCelebrate: win.mp3 loop → synthesis fallback ----
    playCelebrate() {
      if (this.muted) return; this._ensure();
      if (this._hasSound('win')) {
        var a = this.sounds['win'];
        a.loop = true; a.currentTime = 0; a.play(); return;
      }
      var ctx = this.ctx, now = ctx.currentTime;
      _playNoiseHit(ctx, 0.2, 0.18, 800, 0.7, this._dest());
      [0, 7].forEach(function(det) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(523, now); o.detune.value = det;
        g.gain.setValueAtTime(0.06, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        o.connect(g); g.connect(ctx.destination);
        o.start(now); o.stop(now + 0.65);
      });
    },

    // ---- stopWin: stop win.mp3 loop ----
    stopWin() {
      if (this._hasSound('win')) {
        var a = this.sounds['win']; a.pause(); a.currentTime = 0;
      }
    },

    // ---- playVoid: synthesis only ----
    playVoid() {
      if (this.muted) return; this._ensure();
      var ctx = this.ctx, now = ctx.currentTime;
      var buf = _createNoiseBuffer(ctx, 0.5, 'pink');
      var src = ctx.createBufferSource(); src.buffer = buf;
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.setValueAtTime(2500, now);
      lp.frequency.exponentialRampToValueAtTime(120, now + 0.5);
      lp.Q.value = 0.4;
      var nG = ctx.createGain();
      nG.gain.setValueAtTime(0.1, now);
      nG.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      src.connect(lp); lp.connect(nG); nG.connect(this._dest()); src.start(now);
      var bass = ctx.createOscillator(), bG = ctx.createGain();
      bass.type = 'triangle';
      bass.frequency.setValueAtTime(350, now);
      bass.frequency.exponentialRampToValueAtTime(45, now + 0.65);
      bG.gain.setValueAtTime(0.16, now);
      bG.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
      bass.connect(bG); bG.connect(this._dest());
      bass.start(now); bass.stop(now + 0.75);
    }
  };

  // ========== DrawEngine ==========
  const DrawEngine = {
    canvas: null, ctx: null, running: false, animId: null,
    names: [], targetName: '', currentOffset: 0, speed: 0,
    phase: 'idle', flashAlpha: 0, FONT_SIZE: 72, CARD_HEIGHT: 100, VISIBLE_SLOTS: 7,

    init() {
      this.canvas = document.getElementById('animCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.ctx.textAlign = 'center';
      this.ctx.textBaseline = 'middle';
    },

    startSpin(candidates, winnerName, onComplete) {
      this.names = [...candidates].sort(() => Math.random() - 0.5);
      if (!this.names.includes(winnerName)) this.names.push(winnerName);
      this.names = this.names.sort(() => Math.random() - 0.5);
      this.targetName = winnerName;
      this.speed = 18; this.currentOffset = 0;
      this.phase = 'spinning'; this.flashAlpha = 0;
      this.running = true; this._onComplete = onComplete;
      AudioEngine.startHum();
      this._tick();
    },

    // Called by LotteryView when user clicks stop button.
    // Pre-computes a smooth cubic ease-out curve that lands exactly on targetName.
    triggerStop() {
      if (this.phase !== 'spinning') return;
      // Find where targetName should land
      var targetIdx = this.names.indexOf(this.targetName);
      if (targetIdx < 0) targetIdx = 0;
      var cycleLen = this.names.length * this.CARD_HEIGHT;
      // Target position is targetIdx * CARD_HEIGHT, in some future cycle
      var targetInCycle = targetIdx * this.CARD_HEIGHT;
      // Calculate how far ahead to aim: enough cycles to cover ~2s of deceleration
      // At speed 18, cubic ease-out covers ~1/3 speed * duration frames ≈ 18/3 * 140 ≈ 840px
      var estDist = this.speed * 50; // rough decel distance
      var rawTarget = this.currentOffset + estDist;
      // Snap to the next occurrence of targetInCycle after rawTarget
      var cyclesAhead = Math.ceil((rawTarget - targetInCycle) / cycleLen);
      if (cyclesAhead < 2) cyclesAhead = 2; // at least 2 cycles ahead for visual effect
      this._decelTarget = cyclesAhead * cycleLen + targetInCycle;
      this._decelStartOffset = this.currentOffset;
      this._decelDistance = this._decelTarget - this._decelStartOffset;
      // Duration: enough frames to cover the distance with cubic ease-out
      // distance = speed * duration / 3  =>  duration = 3 * distance / speed
      this._decelFrames = Math.max(60, Math.floor(3 * this._decelDistance / this.speed));
      this._decelFrame = 0;
      this.phase = 'decelerating';
    },

    _tick() {
      if (!this.running) return;
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      ctx.fillStyle = 'rgba(0, 20, 40, 0.55)'; ctx.fillRect(0, 0, w, h);
      if (this.phase === 'spinning') {
        this.currentOffset += this.speed;
        if (Math.floor(this.currentOffset / this.CARD_HEIGHT) !==
            Math.floor((this.currentOffset - this.speed) / this.CARD_HEIGHT)) AudioEngine.playTick();
      } else if (this.phase === 'decelerating') {
        // Cubic ease-out: f(t) = 1 - (1 - t)^3
        this._decelFrame++;
        var t = Math.min(this._decelFrame / this._decelFrames, 1.0);
        var eased = 1 - Math.pow(1 - t, 3);
        this.currentOffset = this._decelStartOffset + this._decelDistance * eased;
        if (Math.floor(this.currentOffset / this.CARD_HEIGHT) !==
            Math.floor((this.currentOffset - (this._decelDistance / this._decelFrames * 3)) / this.CARD_HEIGHT)) {
          AudioEngine.playTick();
        }
        if (t >= 1.0) {
          this.currentOffset = this._decelTarget;
          this.phase = 'reveal';
          AudioEngine.stopHum();
          this._onReveal();
        }
      }
      this._drawSlots(ctx, w, h);
      if (this.flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.flashAlpha})`;
        ctx.fillRect(0, 0, w, h); this.flashAlpha *= 0.85;
        if (this.flashAlpha < 0.01) this.flashAlpha = 0;
      }
      this.animId = requestAnimationFrame(() => this._tick());
    },


    _drawSlots(ctx, w, h) {
      const cx = w / 2, cy = h / 2, offset = this.currentOffset, cardH = this.CARD_HEIGHT;
      const windowH = cardH * this.VISIBLE_SLOTS, cardW = Math.min(w * 0.6, 600);
      for (let i = -5; i < this.VISIBLE_SLOTS + 5; i++) {
        const rawIdx = Math.floor((offset + i * cardH) / cardH);
        const ni = ((rawIdx % this.names.length) + this.names.length) % this.names.length;
        const y = cy + i * cardH - (offset % cardH);
        const name = this.names[ni] || '';
        const dist = Math.abs(y - cy) / (windowH / 2);
        const alpha = Math.max(0.15, 1 - dist * 0.85);
        const scale = Math.max(0.6, 1 - dist * 0.4);
        ctx.save(); ctx.translate(cx, y); ctx.scale(scale, scale);
        const grad = ctx.createLinearGradient(-cardW/2, 0, cardW/2, 0);
        const isCenter = Math.abs(y - cy) < cardH * 0.2;
        const isTargetCard = this.phase === 'reveal' && name === this.targetName;
        const isWinner = this.phase === 'reveal' && isCenter;
        grad.addColorStop(0, isWinner ? 'rgba(255,217,102,0.25)' : 'rgba(0,194,203,0.06)');
        grad.addColorStop(1, isWinner ? 'rgba(255,217,102,0.25)' : 'rgba(0,136,204,0.06)');
        ctx.fillStyle = grad; ctx.fillRect(-cardW/2, -cardH/2, cardW, cardH);
        ctx.strokeStyle = isWinner ? `rgba(255,217,102,${alpha})` : `rgba(0,194,203,${alpha * 0.4})`;
        ctx.lineWidth = isWinner ? 3 : 1; ctx.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
        ctx.fillStyle = isWinner ? `rgba(255,217,102,${alpha})` : `rgba(255,255,255,${alpha})`;
        ctx.font = `bold ${this.FONT_SIZE * 0.8}px 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif`;
        if (dist < 0.5) {
          ctx.shadowColor = isWinner ? 'rgba(255,217,102,0.6)' : 'rgba(0,229,238,0.5)';
          ctx.shadowBlur = 20;
        }
        ctx.fillText(name, 0, 0); ctx.shadowBlur = 0; ctx.restore();
      }
      const lineGrad = ctx.createLinearGradient(0, cy - 2, 0, cy + 2);
      lineGrad.addColorStop(0, 'rgba(0,194,203,0)');
      lineGrad.addColorStop(0.5, 'rgba(0,229,238,0.5)');
      lineGrad.addColorStop(1, 'rgba(0,194,203,0)');
      ctx.fillStyle = lineGrad; ctx.fillRect(cx - 320, cy - 2, 640, 4);
    },

    _onReveal() {
      this.flashAlpha = 0.8;
      AudioEngine.playReveal();
      ParticleEngine.burst(window.innerWidth / 2, window.innerHeight / 2, 80);
      setTimeout(() => {
        this.running = false; cancelAnimationFrame(this.animId);
        this.phase = 'winner';
        if (this._onComplete) { const cb = this._onComplete; this._onComplete = null; cb(); }
      }, 1500);
    },

    showWinner(name, prizeName) {
      var self = this;
      this._winnerName = name;
      this._winnerPrize = prizeName;
      this._winnerStartTime = performance.now();
      this._drawWinnerFrame();
    },

    _drawWinnerFrame() {
      var ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      var elapsed = (performance.now() - this._winnerStartTime) / 1000;
      ctx.fillStyle = 'rgba(0, 20, 40, 0.75)'; ctx.fillRect(0, 0, w, h);

      // Prize label
      ctx.fillStyle = 'rgba(0, 229, 238, 0.9)';
      ctx.font = 'bold 32px "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0, 229, 238, 0.6)'; ctx.shadowBlur = 20;
      ctx.fillText(this._winnerPrize + ' 中奖者', w / 2, h * 0.22); ctx.shadowBlur = 0;

      // Winner name with flowing light sweep
      var nameY = h / 2;
      ctx.font = 'bold 96px "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
      ctx.textAlign = 'center';

      // Base gold fill
      ctx.fillStyle = '#FFD966';
      ctx.shadowColor = 'rgba(255, 217, 102, 0.6)'; ctx.shadowBlur = 30;
      ctx.fillText(this._winnerName, w / 2, nameY);

      // Flowing light sweep: a bright gradient that moves across the text
      var sweepX = w / 2 + Math.sin(elapsed * 2.5) * w * 0.55;
      var sweepGrad = ctx.createLinearGradient(sweepX - 120, 0, sweepX + 120, 0);
      sweepGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
      sweepGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.7)');
      sweepGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');

      ctx.fillStyle = sweepGrad;
      ctx.shadowColor = 'rgba(255, 255, 255, 0.9)'; ctx.shadowBlur = 18;
      ctx.fillText(this._winnerName, w / 2, nameY);
      ctx.shadowBlur = 0;

      // Sparkle particles around the name
      var sparkleCount = 12;
      for (var i = 0; i < sparkleCount; i++) {
        var angle = (Math.PI * 2 * i / sparkleCount) + elapsed * 0.8;
        var radius = 140 + Math.sin(elapsed * 3 + i) * 30;
        var sx = w / 2 + Math.cos(angle) * radius;
        var sy = nameY + Math.sin(angle) * radius * 0.4;
        var sparkleAlpha = 0.3 + Math.sin(elapsed * 5 + i * 2) * 0.5;
        if (sparkleAlpha < 0) sparkleAlpha = 0;
        ctx.beginPath(); ctx.arc(sx, sy, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 220, ' + sparkleAlpha + ')';
        ctx.fill();
        ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 217, 102, ' + (sparkleAlpha * 0.35) + ')';
        ctx.fill();
      }

      // Continue animation
      var self = this;
      this._winnerAnimId = requestAnimationFrame(function() { self._drawWinnerFrame(); });
    },

    stopWinnerAnimation() {
      if (this._winnerAnimId) { cancelAnimationFrame(this._winnerAnimId); this._winnerAnimId = null; }
    },

    playVoidAnimation(name, onComplete) {
      const ctx = this.ctx, w = window.innerWidth, h = window.innerHeight;
      let alpha = 1, strikeX = 0;
      AudioEngine.playVoid();
      const anim = () => {
        ctx.fillStyle = 'rgba(0, 20, 40, 0.7)'; ctx.fillRect(0, 0, w, h);
        alpha -= 0.02; strikeX += 12;
        ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`;
        ctx.font = 'bold 96px "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(name, w / 2, h / 2);
        if (strikeX < w * 0.6) {
          ctx.strokeStyle = `rgba(239, 68, 68, ${alpha + 0.2})`; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(w / 2 - strikeX, h / 2 + 10);
          ctx.lineTo(w / 2 - strikeX + w * 0.5, h / 2 - 20); ctx.stroke();
        }
        if (alpha <= 0) { ctx.clearRect(0, 0, w, h); if (onComplete) onComplete(); return; }
        requestAnimationFrame(anim);
      }; anim();
    },

    clear() {
      this.running = false;
      if (this.animId) cancelAnimationFrame(this.animId);
      this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  };

  // ========== LotteryView ==========
  const LotteryView = {
    _currentWinner: null,

    init() {
      var self = this;
      document.getElementById('btnStartDraw').addEventListener('click', function() { self.startDraw(); });
      document.getElementById('btnStopDraw').addEventListener('click', function() { self._onStopClick(); });
      document.getElementById('btnConfirm').addEventListener('click', function() { self.confirmWinner(); });
      document.getElementById('btnVoid').addEventListener('click', function() { self.voidWinner(); });
      document.getElementById('btnNextPrize').addEventListener('click', function() { self._onNextPrize(); });
    },

    show() {
      ViewController.switchTo('view-lottery');
      const state = StateManager.state;
      if (state.currentPrizeIdx >= state.config.length) { ResultsView.show(); return; }
      if (state.candidates.length === 0) {
        alert('候选池已无可用人员，抽奖终止'); ResultsView.show(); return;
      }
      this._renderStandby();
      ParticleEngine.setMode('idle'); DrawEngine.clear();
    },

    _renderStandby() {
      const s = StateManager.state, prize = s.config[s.currentPrizeIdx];
      document.getElementById('lotteryPrizeName').textContent = `🏆 ${prize.name}`;
      document.getElementById('lotteryProgress').textContent = `已抽出 ${s.currentSlotIdx}/${prize.count} 人`;
      document.getElementById('standbyNext').textContent = `准备抽取：${prize.name} 第 ${s.currentSlotIdx + 1} 位`;
      document.getElementById('standbyRemaining').textContent = `剩余候选：${s.candidates.length} 人`;
      const drawn = s.winners.filter(w => w.prize === prize.name).slice(-prize.count);
      document.getElementById('standbyDrawn').innerHTML = drawn.map(w => `<span class="drawn-tag">${this._esc(w.name)}</span>`).join('');
      document.getElementById('lotteryStandby').style.display = 'block';
      document.getElementById('lotteryActions').style.display = 'none';
    },

    startDraw() {
      var candidates = StateManager.state.candidates;
      if (!candidates.length) { alert('候选池已无可用人员'); return; }
      document.getElementById('lotteryStandby').style.display = 'none';
      document.getElementById('lotteryActions').style.display = 'none';
      // Show stop button
      document.getElementById('lotteryStopArea').style.display = 'flex';
      ParticleEngine.setMode('accelerate');
      if (candidates.length === 1) { this._currentWinner = candidates[0]; this._showWinnerScreen(); return; }
      var idx = Math.floor(Math.random() * candidates.length);
      this._currentWinner = candidates[idx];
      var self = this;
      DrawEngine.startSpin(candidates, this._currentWinner, function() { self._showWinnerScreen(); });
    },

    _onStopClick() {
      document.getElementById('lotteryStopArea').style.display = 'none';
      DrawEngine.triggerStop();
    },

    _showWinnerScreen() {
      ParticleEngine.setMode('burst');
      DrawEngine.stopWinnerAnimation();
      DrawEngine.showWinner(this._currentWinner, StateManager.state.config[StateManager.state.currentPrizeIdx].name);
      AudioEngine.playCelebrate();
      document.getElementById('lotteryActions').style.display = 'flex';
    },

    confirmWinner() {
      var s = StateManager.state, prize = s.config[s.currentPrizeIdx];
      var idx = s.candidates.indexOf(this._currentWinner);
      if (idx !== -1) s.candidates.splice(idx, 1);
      s.winners.push({
        name: this._currentWinner, prize: prize.name,
        time: new Date().toLocaleString('zh-CN', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false })
      });
      s.currentSlotIdx++; StateManager.save();
      AudioEngine.stopWin(); DrawEngine.stopWinnerAnimation(); DrawEngine.clear(); ParticleEngine.setMode('idle');
      if (s.currentSlotIdx >= prize.count) {
        // Prize complete - show prize summary before next
        this._showPrizeSummary(prize);
      } else {
        this._renderStandby();
      }
    },

    _showPrizeSummary(prize) {
      var s = StateManager.state;
      var winners = s.winners.filter(function(w) { return w.prize === prize.name; });
      document.getElementById('lotteryPrizeName').textContent = '';
      document.getElementById('lotteryProgress').textContent = '';
      document.getElementById('lotteryStandby').style.display = 'none';
      document.getElementById('lotteryActions').style.display = 'none';
      document.getElementById('lotteryStopArea').style.display = 'none';
      var summary = document.getElementById('prizeSummary');
      document.getElementById('summaryPrizeName').textContent = prize.name + ' 中奖名单';
      document.getElementById('summaryWinnerList').innerHTML = winners.map(function(w, i) {
        return '<div class="summary-winner-card"><span class="summary-num">#' + (i + 1) + '</span><span class="summary-name">' + LotteryView._esc(w.name) + '</span></div>';
      }).join('');
      document.getElementById('btnNextPrize').textContent = s.currentPrizeIdx + 1 < s.config.length
        ? '进入下一个奖项 →'
        : '查看全部结果 →';
      summary.style.display = 'flex';
    },

    _onNextPrize() {
      var s = StateManager.state;
      s.currentPrizeIdx++; s.currentSlotIdx = 0; StateManager.save();
      document.getElementById('prizeSummary').style.display = 'none';
      if (s.currentPrizeIdx >= s.config.length) { ResultsView.show(); return; }
      this._renderStandby();
    },

    voidWinner() {
      var s = StateManager.state;
      var idx = s.candidates.indexOf(this._currentWinner);
      if (idx !== -1) s.candidates.splice(idx, 1);
      StateManager.save();
      AudioEngine.stopWin(); DrawEngine.stopWinnerAnimation();
      var self = this;
      DrawEngine.playVoidAnimation(this._currentWinner, function() {
        if (!s.candidates.length) {
          alert('候选池已无可用人员，该奖项剩余名额无法继续抽取');
          s.currentPrizeIdx++; s.currentSlotIdx = 0; StateManager.save();
          if (s.currentPrizeIdx >= s.config.length) { ResultsView.show(); return; }
        }
        DrawEngine.clear(); ParticleEngine.setMode('idle'); self._renderStandby();
      });
    },

    _esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; },
    hide() { document.getElementById('view-lottery').classList.remove('active'); DrawEngine.clear(); }
  };

  // ========== ResultsView ==========
  const ResultsView = {
    init() {
      document.getElementById('btnExport').addEventListener('click', () => this.exportCSV());
      document.getElementById('btnPrint').addEventListener('click', () => window.print());
      document.getElementById('btnReset').addEventListener('click', () => this.resetAll());
    },

    show() {
      ViewController.switchTo('view-results');
      const winners = StateManager.state.winners, config = StateManager.state.config;
      const grouped = {};
      for (const p of config) grouped[p.name] = winners.filter(w => w.prize === p.name);
      document.getElementById('resultsList').innerHTML = config.map(p => {
        const list = grouped[p.name] || [];
        return `<div class="prize-group"><h2>🏆 ${this._esc(p.name)}（${list.length}/${p.count}）</h2>
          <div class="winner-cards">${list.map(w => `<span class="winner-card">★ ${this._esc(w.name)}</span>`).join('')}
          ${!list.length ? '<span style="color:var(--text-dim);">暂无中奖者</span>' : ''}</div></div>`;
      }).join('');
      document.getElementById('resultsTotal').textContent = `共计抽出：${winners.length} 人`;
    },

    exportCSV() {
      const winners = StateManager.state.winners;
      const csv = '﻿奖项,姓名,中奖时间\n' + winners.map(w => `"${w.prize}","${w.name}","${w.time}"`).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob), a = document.createElement('a');
      a.href = url; a.download = `lottery-results-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    },

    resetAll() {
      if (confirm('确定要重置全部数据吗？此操作不可恢复！')) {
        if (confirm('再次确认：所有中奖记录和名单将被清除')) { StateManager.reset(); ConfigView.show(); }
      }
    },

    _esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; },
    hide() { document.getElementById('view-results').classList.remove('active'); }
  };

  // ========== App Initialization ==========
  (function App() {
    checkRestore();
    ParticleEngine.init();
    DrawEngine.init();
    ConfigView.init();
    ImportView.init();
    LotteryView.init();
    ResultsView.init();

    document.getElementById('btnMute').addEventListener('click', () => {
      if (!AudioEngine.ctx) AudioEngine.init();
      AudioEngine.toggleMute();
    });

    document.addEventListener('click', function initAudio() {
      if (!AudioEngine.ctx) AudioEngine.init();
    }, { once: true });

    const state = StateManager.state;
    if (state.config.length === 0) { ConfigView.show(); }
    else if (state.candidates.length === 0) { ImportView.show(); }
    else if (state.currentPrizeIdx < state.config.length) { LotteryView.show(); }
    else { ResultsView.show(); }
  })();
  </script>
